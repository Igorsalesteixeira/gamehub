<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #4CAF50;
      color: #3E2723;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== CONTAINER ===== */
    .festa-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    /* ===== HERO ===== */
    .festa-hero {
      text-align: center;
      padding: 1.5rem 0 2rem;
    }
    .festa-hero-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .festa-hero h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 0.3rem;
    }
    .festa-hero p {
      color: rgba(255,255,255,0.8);
      font-size: 0.92rem;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== INPUTS & BUTTONS ===== */
    .festa-input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border-radius: 12px;
      border: 2px solid #D7CCC8;
      background: #FFF8F0;
      color: #3E2723;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
    }
    .festa-input:focus {
      border-color: #FF5722;
    }
    .festa-input::placeholder {
      color: #795548;
    }
    .festa-input.code-input {
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 14px;
      border: 3px solid #2E7D32;
      background: linear-gradient(180deg, #66BB6A, #43A047, #388E3C);
      color: #FFFFFF;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #2E7D32;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #2E7D32;
    }
    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #2E7D32;
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 14px;
      border: 2px solid #5D4037;
      background: #8D6E63;
      color: #FFFFFF;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 3px 0 #5D4037;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #5D4037;
    }
    .btn-secondary:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #5D4037;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .form-divider {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 0;
    }

    .join-row {
      display: flex;
      gap: 0.6rem;
    }
    .join-row .festa-input { flex: 1; }
    .join-row .btn-secondary { width: auto; padding: 0.85rem 1.5rem; }

    /* ===== LOBBY ===== */
    .lobby-code-box {
      text-align: center;
      background: #F5E6D0;
      border: 3px solid #8D6E63;
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .lobby-code-box:hover {
      border-color: #FF5722;
    }
    .lobby-code-label {
      font-size: 0.8rem;
      color: #795548;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }
    .lobby-code {
      font-family: 'Nunito', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 8px;
      color: #FF5722;
    }
    .lobby-code-hint {
      font-size: 0.75rem;
      color: #795548;
      margin-top: 0.3rem;
    }

    .lobby-players {
      margin-bottom: 1.5rem;
    }
    .lobby-players-title {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
    }
    .player-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .player-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      background: #F5E6D0;
      border: 2px solid #8D6E63;
      border-radius: 12px;
    }
    .player-name {
      font-weight: 600;
      color: #3E2723;
    }
    .player-host {
      font-size: 0.75rem;
      color: #FF5722;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .player-score {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: #FF5722;
    }

    .lobby-actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .btn-whatsapp {
      width: 100%;
      padding: 0.75rem;
      border-radius: 14px;
      border: 2px solid #1B9E3E;
      background: #25d366;
      color: #FFFFFF;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 3px 0 #1B9E3E;
      transition: all 0.2s;
    }
    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #1B9E3E;
    }

    .btn-leave {
      width: 100%;
      padding: 0.6rem;
      border-radius: 10px;
      border: 2px solid #D7CCC8;
      background: #F5E6D0;
      color: #795548;
      font-family: 'Nunito', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .btn-leave:hover { color: #3E2723; }

    /* ===== MINI-GAME AREA ===== */
    .game-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .game-header-icon {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }
    .game-header h2 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #FFFFFF;
    }
    .game-header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
    }

    .game-timer {
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #FFD54F;
      margin-bottom: 1rem;
    }
    .game-timer.warning { color: #ff6b6b; }

    .game-score-live {
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-bottom: 1.5rem;
    }
    .game-score-live span {
      color: #FFD54F;
      font-size: 1.5rem;
    }

    /* Speed Math */
    .math-question {
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 1rem;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .math-input-row {
      display: flex;
      gap: 0.6rem;
      max-width: 300px;
      margin: 0 auto;
    }
    .math-input-row input {
      flex: 1;
      text-align: center;
      font-size: 1.5rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
    }
    .math-progress {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    .math-feedback {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      min-height: 2rem;
      margin-top: 0.5rem;
    }
    .math-feedback.correct { color: #FFFFFF; }
    .math-feedback.wrong { color: #FFD54F; }

    /* Click Frenzy */
    .click-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }
    .click-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 4px solid #FF5722;
      background: radial-gradient(circle, rgba(255,87,34,0.3), rgba(255,87,34,0.08));
      color: #FF5722;
      font-family: 'Nunito', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s, background 0.08s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .click-btn:active {
      transform: scale(0.92);
      background: radial-gradient(circle, rgba(255,87,34,0.5), rgba(255,87,34,0.15));
    }

    /* Reaction */
    .reaction-box {
      width: 100%;
      height: 260px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .reaction-box.waiting {
      background: #c0392b;
    }
    .reaction-box.ready {
      background: #27ae60;
    }
    .reaction-box.idle {
      background: #F5E6D0;
      border: 3px solid #8D6E63;
    }
    .reaction-box.too-early {
      background: #e67e22;
    }
    .reaction-text {
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }
    .reaction-box.idle .reaction-text {
      color: #3E2723;
    }
    .reaction-round-info {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      margin-top: 1rem;
    }
    .reaction-result {
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #FFD54F;
      margin-top: 0.5rem;
      min-height: 2.5rem;
    }

    /* ===== SCOREBOARD ===== */
    .scoreboard {
      margin-bottom: 1.5rem;
    }
    .scoreboard-title {
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 0.3rem;
    }
    .scoreboard-round {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 1.2rem;
    }
    .score-row {
      display: flex;
      align-items: center;
      padding: 0.8rem 1rem;
      background: #F5E6D0;
      border: 2px solid #8D6E63;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      gap: 0.8rem;
    }
    .score-row.first {
      border-color: #FF5722;
      background: #FFF3E0;
    }
    .score-rank {
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #795548;
      min-width: 2rem;
      text-align: center;
    }
    .score-row.first .score-rank { color: #FF5722; }
    .score-name {
      flex: 1;
      font-weight: 600;
      color: #3E2723;
    }
    .score-pts {
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #FF5722;
    }

    /* ===== FINAL ===== */
    .final-screen {
      text-align: center;
      padding: 2rem 0;
    }
    .final-crown {
      font-size: 4rem;
      animation: crownBounce 1s ease infinite;
    }
    @keyframes crownBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .final-winner {
      font-family: 'Nunito', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #FFFFFF;
      margin: 0.5rem 0;
    }
    .final-score {
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2rem;
    }
    .confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: confettiFall 3s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #F5E6D0;
      border: 2px solid #8D6E63;
      color: #3E2723;
      padding: 0.6rem 1.4rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .festa-hero h1 { font-size: 1.8rem; }
      .lobby-code { font-size: 2.4rem; letter-spacing: 5px; }
      .math-question { font-size: 2.4rem; }
      .click-btn { width: 160px; height: 160px; font-size: 2.4rem; }
      .reaction-box { height: 200px; }
    }
  </style>
</head>
<body>

  <div class="festa-container">

    <!-- ===== HERO ===== -->
    <div class="festa-hero">
      <div class="festa-hero-icon">&#127881;</div>
      <h1>Modo Festa</h1>
      <p>Reuna amigos e disputem mini-games em tempo real</p>
    </div>

    <!-- ===== SCREEN: INITIAL ===== -->
    <div id="screen-initial" class="screen active">
      <div class="form-group">
        <input type="text" id="input-name" class="festa-input" placeholder="Seu nome" maxlength="20" autocomplete="off" />
        <button id="btn-create" class="btn-primary">Criar Festa</button>
      </div>
      <div class="form-divider">ou entre numa festa existente</div>
      <div class="join-row">
        <input type="text" id="input-code" class="festa-input code-input" placeholder="CODIGO" maxlength="6" autocomplete="off" />
        <button id="btn-join" class="btn-secondary">Entrar</button>
      </div>
    </div>

    <!-- ===== SCREEN: LOBBY ===== -->
    <div id="screen-lobby" class="screen">
      <div id="lobby-code-box" class="lobby-code-box">
        <div class="lobby-code-label">Codigo da Festa</div>
        <div id="lobby-code" class="lobby-code"></div>
        <div class="lobby-code-hint">Toque para copiar</div>
      </div>
      <div class="lobby-players">
        <div class="lobby-players-title">Jogadores</div>
        <div id="player-list" class="player-list"></div>
      </div>
      <div class="lobby-actions">
        <button id="btn-start" class="btn-primary" style="display:none">Comecar Rodada</button>
        <button id="btn-whatsapp" class="btn-whatsapp">Convidar pelo WhatsApp</button>
        <button id="btn-leave" class="btn-leave">Sair da Festa</button>
      </div>
    </div>

    <!-- ===== SCREEN: GAME ===== -->
    <div id="screen-game" class="screen">
      <div class="game-header">
        <div id="game-icon" class="game-header-icon"></div>
        <h2 id="game-title"></h2>
        <p id="game-desc"></p>
      </div>
      <div id="game-timer" class="game-timer"></div>
      <div id="game-score-live" class="game-score-live">Pontos: <span id="live-score">0</span></div>
      <div id="game-area"></div>
    </div>

    <!-- ===== SCREEN: SCOREBOARD ===== -->
    <div id="screen-scoreboard" class="screen">
      <div class="scoreboard">
        <div class="scoreboard-title">Placar</div>
        <div id="scoreboard-round" class="scoreboard-round"></div>
        <div id="scoreboard-list"></div>
      </div>
      <button id="btn-next-round" class="btn-primary" style="display:none">Proxima Rodada</button>
      <div id="waiting-host" style="text-align:center;color:rgba(255,255,255,0.35);font-size:0.9rem;display:none;">
        Aguardando o host iniciar a proxima rodada...
      </div>
    </div>

    <!-- ===== SCREEN: FINAL ===== -->
    <div id="screen-final" class="screen">
      <div class="final-screen">
        <div class="final-crown">&#128081;</div>
        <div id="final-winner" class="final-winner"></div>
        <div id="final-score-text" class="final-score"></div>
        <div id="final-ranking"></div>
        <button id="btn-new-party" class="btn-primary" style="margin-top:2rem;">Nova Festa</button>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { partyManager, MINI_GAMES } from './games/shared/party-manager.js';
    import { initSidebar } from './sidebar.js?v=9';
    initSidebar({ active: 'festa' });

    // ===== DOM REFS =====
    const $ = id => document.getElementById(id);
    const screens = {
      initial: $('screen-initial'),
      lobby: $('screen-lobby'),
      game: $('screen-game'),
      scoreboard: $('screen-scoreboard'),
      final: $('screen-final')
    };

    let currentScreen = 'initial';
    let currentGameCleanup = null;
    let roomCode = null;

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
      currentScreen = name;
    }

    function showToast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== CHECK URL CODE =====
    const urlCode = new URLSearchParams(location.search).get('code');
    if (urlCode) {
      $('input-code').value = urlCode.toUpperCase();
    }

    // ===== CREATE PARTY =====
    $('btn-create').addEventListener('click', async () => {
      const name = $('input-name').value.trim();
      if (!name) { showToast('Digite seu nome'); return; }
      $('btn-create').disabled = true;
      $('btn-create').textContent = 'Criando...';
      try {
        const { code } = await partyManager.createRoom(name);
        roomCode = code;
        setupCallbacks();
        enterLobby(code);
      } catch (e) {
        showToast('Erro ao criar festa');
      } finally {
        $('btn-create').disabled = false;
        $('btn-create').textContent = 'Criar Festa';
      }
    });

    // ===== JOIN PARTY =====
    $('btn-join').addEventListener('click', async () => {
      const name = $('input-name').value.trim();
      const code = $('input-code').value.trim().toUpperCase();
      if (!name) { showToast('Digite seu nome'); return; }
      if (!code || code.length < 4) { showToast('Digite o codigo da festa'); return; }
      $('btn-join').disabled = true;
      try {
        await partyManager.joinRoom(code, name);
        roomCode = code;
        setupCallbacks();
        enterLobby(code);
      } catch (e) {
        showToast('Festa nao encontrada');
      } finally {
        $('btn-join').disabled = false;
      }
    });

    // ===== LOBBY =====
    function enterLobby(code) {
      $('lobby-code').textContent = code;
      $('btn-start').style.display = partyManager.isHost ? 'block' : 'none';
      showScreen('lobby');
    }

    $('lobby-code-box').addEventListener('click', () => {
      navigator.clipboard.writeText(roomCode).then(() => showToast('Codigo copiado!'));
    });

    $('btn-whatsapp').addEventListener('click', () => {
      const text = partyManager.getShareText(roomCode);
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    });

    $('btn-start').addEventListener('click', () => {
      partyManager.startRound();
    });

    $('btn-leave').addEventListener('click', async () => {
      await partyManager.leave();
      showScreen('initial');
    });

    $('btn-next-round').addEventListener('click', () => {
      partyManager.startRound();
    });

    $('btn-new-party').addEventListener('click', async () => {
      await partyManager.leave();
      showScreen('initial');
    });

    // ===== CALLBACKS =====
    function setupCallbacks() {
      partyManager.onPlayersUpdate = (players) => {
        renderPlayerList(players);
      };

      partyManager.onGameStart = (payload) => {
        startMiniGame(payload);
      };

      partyManager.onScoreUpdate = (scores) => {
        // scores update in real time — stored in partyManager.scores
      };

      partyManager.onRoundEnd = (payload) => {
        if (currentGameCleanup) { currentGameCleanup(); currentGameCleanup = null; }
        showScoreboard(payload);
      };

      partyManager.onPartyEnd = (payload) => {
        if (currentGameCleanup) { currentGameCleanup(); currentGameCleanup = null; }
        showFinal(payload);
      };
    }

    function renderPlayerList(players) {
      const list = $('player-list');
      list.innerHTML = players.map(p => `
        <div class="player-item">
          <span class="player-name">${escapeHtml(p.name)}</span>
          ${p.isHost ? '<span class="player-host">Host</span>' : ''}
          <span class="player-score">${p.score}</span>
        </div>
      `).join('');
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ===== MINI-GAME DISPATCH =====
    const FALLBACK = {
      'memory-flash': 'speed-math',
      'word-scramble': 'click-frenzy',
      'color-match': 'reaction'
    };
    const IMPLEMENTED = ['speed-math', 'click-frenzy', 'reaction'];

    function startMiniGame(payload) {
      const game = payload.game;
      const gameId = IMPLEMENTED.includes(game.id) ? game.id : (FALLBACK[game.id] || 'speed-math');
      const gameInfo = IMPLEMENTED.includes(game.id) ? game : MINI_GAMES.find(g => g.id === gameId) || game;

      $('game-icon').textContent = gameInfo.icon;
      $('game-title').textContent = gameInfo.name;
      $('game-desc').textContent = `Rodada ${payload.round} de ${payload.totalRounds}`;
      $('live-score').textContent = '0';
      $('game-area').innerHTML = '';

      showScreen('game');

      if (gameId === 'speed-math') startSpeedMath(gameInfo);
      else if (gameId === 'click-frenzy') startClickFrenzy(gameInfo);
      else if (gameId === 'reaction') startReaction(gameInfo);
    }

    function endMiniGame(score) {
      partyManager.reportScore(partyManager.playerName, score);
      if (partyManager.isHost) {
        setTimeout(() => partyManager.endRound(), 2000);
      }
    }

    // ===== SPEED MATH =====
    function startSpeedMath(game) {
      const area = $('game-area');
      const totalQuestions = 10;
      const timeLimit = 30;
      let questionNum = 0;
      let correctCount = 0;
      let timeLeft = timeLimit;
      let timerInterval = null;
      let finished = false;

      area.innerHTML = `
        <div id="math-q" class="math-question"></div>
        <div class="math-input-row">
          <input type="number" id="math-answer" class="festa-input" placeholder="?" inputmode="numeric" autocomplete="off" />
          <button id="math-submit" class="btn-primary" style="width:auto;padding:0.85rem 1.5rem;">OK</button>
        </div>
        <div id="math-feedback" class="math-feedback"></div>
        <div id="math-progress" class="math-progress"></div>
      `;

      let currentAnswer = 0;

      function nextQuestion() {
        if (questionNum >= totalQuestions || finished) {
          finish();
          return;
        }
        questionNum++;
        const ops = ['+', '-', '*'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a, b;
        if (op === '*') {
          a = Math.floor(Math.random() * 12) + 1;
          b = Math.floor(Math.random() * 12) + 1;
        } else {
          a = Math.floor(Math.random() * 20) + 1;
          b = Math.floor(Math.random() * 20) + 1;
        }
        if (op === '-' && b > a) { [a, b] = [b, a]; }

        const display = `${a} ${op === '*' ? '\u00D7' : op} ${b}`;
        currentAnswer = op === '+' ? a + b : op === '-' ? a - b : a * b;

        $('math-q').textContent = display;
        $('math-progress').textContent = `Pergunta ${questionNum} de ${totalQuestions}`;
        $('math-feedback').textContent = '';
        $('math-feedback').className = 'math-feedback';
        const inp = $('math-answer');
        inp.value = '';
        inp.focus();
      }

      function checkAnswer() {
        const val = parseInt($('math-answer').value);
        if (isNaN(val)) return;
        if (val === currentAnswer) {
          correctCount++;
          $('math-feedback').textContent = 'Correto!';
          $('math-feedback').className = 'math-feedback correct';
        } else {
          $('math-feedback').textContent = `Errado! Era ${currentAnswer}`;
          $('math-feedback').className = 'math-feedback wrong';
        }
        $('live-score').textContent = correctCount * 100;
        setTimeout(nextQuestion, 600);
      }

      function finish() {
        if (finished) return;
        finished = true;
        clearInterval(timerInterval);
        const score = correctCount * 100;
        $('game-timer').textContent = 'Fim!';
        $('game-timer').classList.remove('warning');
        area.innerHTML = `<div style="text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:#81ecff;margin-top:1rem;">${correctCount} acertos = ${score} pts</div>`;
        endMiniGame(score);
      }

      $('math-submit').addEventListener('click', checkAnswer);
      $('math-answer').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkAnswer();
      });

      timerInterval = setInterval(() => {
        timeLeft--;
        $('game-timer').textContent = timeLeft + 's';
        if (timeLeft <= 5) $('game-timer').classList.add('warning');
        if (timeLeft <= 0) finish();
      }, 1000);
      $('game-timer').textContent = timeLeft + 's';
      $('game-timer').classList.remove('warning');

      nextQuestion();

      currentGameCleanup = () => {
        finished = true;
        clearInterval(timerInterval);
      };
    }

    // ===== CLICK FRENZY =====
    function startClickFrenzy(game) {
      const area = $('game-area');
      const timeLimit = 10;
      let clicks = 0;
      let timeLeft = timeLimit;
      let timerInterval = null;
      let finished = false;

      area.innerHTML = `
        <div class="click-area">
          <button id="click-btn" class="click-btn">0</button>
        </div>
      `;

      $('click-btn').addEventListener('click', () => {
        if (finished) return;
        clicks++;
        $('click-btn').textContent = clicks;
        $('live-score').textContent = clicks * 10;
      });

      timerInterval = setInterval(() => {
        timeLeft--;
        $('game-timer').textContent = timeLeft + 's';
        if (timeLeft <= 3) $('game-timer').classList.add('warning');
        if (timeLeft <= 0) finish();
      }, 1000);
      $('game-timer').textContent = timeLeft + 's';
      $('game-timer').classList.remove('warning');

      function finish() {
        if (finished) return;
        finished = true;
        clearInterval(timerInterval);
        const score = clicks * 10;
        $('game-timer').textContent = 'Fim!';
        $('game-timer').classList.remove('warning');
        area.innerHTML = `<div style="text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:#81ecff;margin-top:1rem;">${clicks} cliques = ${score} pts</div>`;
        endMiniGame(score);
      }

      currentGameCleanup = () => {
        finished = true;
        clearInterval(timerInterval);
      };
    }

    // ===== REACTION =====
    function startReaction(game) {
      const area = $('game-area');
      const totalRounds = 5;
      const MAX_SCORE_PER_ROUND = 1000;
      let roundNum = 0;
      let totalScore = 0;
      let reactionTimes = [];
      let state = 'idle';
      let waitTimeout = null;
      let startTime = 0;
      let finished = false;

      $('game-timer').textContent = '';

      area.innerHTML = `
        <div id="reaction-box" class="reaction-box idle">
          <div class="reaction-text">Toque para comecar</div>
        </div>
        <div id="reaction-round-info" class="reaction-round-info"></div>
        <div id="reaction-result" class="reaction-result"></div>
      `;

      const box = $('reaction-box');

      function nextRound() {
        if (roundNum >= totalRounds || finished) {
          finishReaction();
          return;
        }
        roundNum++;
        $('reaction-round-info').textContent = `Rodada ${roundNum} de ${totalRounds}`;
        $('reaction-result').textContent = '';
        state = 'waiting';
        box.className = 'reaction-box waiting';
        box.querySelector('.reaction-text').textContent = 'Espere o verde...';

        const delay = 2000 + Math.random() * 3000;
        waitTimeout = setTimeout(() => {
          if (finished) return;
          state = 'ready';
          box.className = 'reaction-box ready';
          box.querySelector('.reaction-text').textContent = 'CLIQUE AGORA!';
          startTime = performance.now();
        }, delay);
      }

      box.addEventListener('click', () => {
        if (finished) return;

        if (state === 'idle') {
          nextRound();
          return;
        }

        if (state === 'waiting') {
          clearTimeout(waitTimeout);
          state = 'too-early';
          box.className = 'reaction-box too-early';
          box.querySelector('.reaction-text').textContent = 'Cedo demais! Toque para tentar de novo';
          roundNum--;
          setTimeout(() => {
            if (!finished) {
              state = 'idle';
              box.className = 'reaction-box idle';
              box.querySelector('.reaction-text').textContent = 'Toque para continuar';
            }
          }, 1200);
          return;
        }

        if (state === 'ready') {
          const rt = Math.round(performance.now() - startTime);
          reactionTimes.push(rt);
          const roundScore = Math.max(0, MAX_SCORE_PER_ROUND - rt);
          totalScore += roundScore;
          $('live-score').textContent = totalScore;
          $('reaction-result').textContent = `${rt}ms (+${roundScore} pts)`;

          state = 'idle';
          box.className = 'reaction-box idle';
          box.querySelector('.reaction-text').textContent = roundNum < totalRounds ? 'Toque para proxima rodada' : 'Finalizando...';

          if (roundNum >= totalRounds) {
            setTimeout(finishReaction, 1000);
          }
          return;
        }
      });

      function finishReaction() {
        if (finished) return;
        finished = true;
        clearTimeout(waitTimeout);
        const avg = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;
        area.innerHTML = `<div style="text-align:center;font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:#81ecff;margin-top:1rem;">Media: ${avg}ms<br>${totalScore} pts</div>`;
        $('game-timer').textContent = 'Fim!';
        endMiniGame(totalScore);
      }

      currentGameCleanup = () => {
        finished = true;
        clearTimeout(waitTimeout);
      };
    }

    // ===== SCOREBOARD =====
    function showScoreboard(payload) {
      const scores = payload.scores || {};
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

      $('scoreboard-round').textContent = `Apos rodada ${payload.round}`;
      $('scoreboard-list').innerHTML = sorted.map(([name, pts], i) => `
        <div class="score-row ${i === 0 ? 'first' : ''}">
          <div class="score-rank">${i + 1}</div>
          <div class="score-name">${escapeHtml(name)}</div>
          <div class="score-pts">${pts}</div>
        </div>
      `).join('');

      $('btn-next-round').style.display = partyManager.isHost ? 'block' : 'none';
      $('waiting-host').style.display = partyManager.isHost ? 'none' : 'block';
      showScreen('scoreboard');
    }

    // ===== FINAL =====
    function showFinal(payload) {
      const scores = payload.scores || {};
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const winner = sorted[0];

      $('final-winner').textContent = winner ? winner[0] : '---';
      $('final-score-text').textContent = winner ? `${winner[1]} pontos` : '';

      $('final-ranking').innerHTML = sorted.map(([name, pts], i) => `
        <div class="score-row ${i === 0 ? 'first' : ''}">
          <div class="score-rank">${i + 1}</div>
          <div class="score-name">${escapeHtml(name)}</div>
          <div class="score-pts">${pts}</div>
        </div>
      `).join('');

      showScreen('final');
      spawnConfetti();
    }

    function spawnConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti';
      document.body.appendChild(container);

      const colors = ['#81ecff', '#ff51fa', '#ffd700', '#4ade80', '#ff6b6b'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = piece.style.width;
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 5000);
    }
  </script>
  <script type="module" src="games/shared/pwa-register.js?v=1"></script>
