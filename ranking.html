  <style>
    .ranking-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
      flex: 1;
    }

    .ranking-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .ranking-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #333;
    }

    .ranking-timer {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.3rem;
      font-weight: 600;
    }

    .ranking-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .ranking-tab {
      padding: 0.5rem 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 999px;
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ranking-tab:hover { border-color: #ff6b35; color: #ff6b35; }

    .ranking-tab.active {
      background: #ff6b35;
      color: #fff;
      border-color: #ff6b35;
    }

    .ranking-tab[data-game="overall"] {
      border-color: #ffd700;
      color: #7a6200;
      font-weight: 800;
    }

    .ranking-tab[data-game="overall"]:hover {
      background: #ffd700;
      color: #7a6200;
      border-color: #ffd700;
    }

    .ranking-tab[data-game="overall"].active {
      background: #ffd700;
      color: #7a6200;
      border-color: #ffd700;
    }

    .ranking-table {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .ranking-criterion {
      text-align: center;
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: #888;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }

    .ranking-row {
      display: flex;
      align-items: center;
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid #f0f0f0;
      gap: 1rem;
      transition: background 0.15s;
    }

    .ranking-row:last-child { border-bottom: none; }
    .ranking-row:hover { background: #fafafa; }

    .ranking-row.top-1 { background: linear-gradient(90deg, #fff9e6, #fff); }
    .ranking-row.top-2 { background: linear-gradient(90deg, #f5f5f5, #fff); }
    .ranking-row.top-3 { background: linear-gradient(90deg, #fdf0e8, #fff); }

    .ranking-pos {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .pos-1 { background: #ffd700; color: #7a6200; }
    .pos-2 { background: #c0c0c0; color: #555; }
    .pos-3 { background: #cd7f32; color: #fff; }
    .pos-other { background: #f0f0f0; color: #888; }

    .ranking-name {
      flex: 1;
      font-weight: 700;
      font-size: 0.95rem;
      color: #333;
    }

    .ranking-name.is-me { color: #ff6b35; }

    .ranking-wins {
      font-weight: 800;
      font-size: 1rem;
      color: #ff6b35;
      white-space: nowrap;
    }

    .ranking-sub {
      font-size: 0.78rem;
      color: #aaa;
      font-weight: 600;
      white-space: nowrap;
    }

    .ranking-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
      font-size: 1rem;
    }

    .ranking-empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.2);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.4);
      transition: background 0.2s;
    }

    .back-link:hover { background: rgba(255,255,255,0.35); }

    @media (max-width: 480px) {
      .ranking-container { padding: 1.2rem 0.8rem; }
      .ranking-header h2 { font-size: 1.4rem; }
      .ranking-row { padding: 0.6rem 0.8rem; }
    }
  </style>
</head>

  <footer class="footer">

  <script type="module">
    import { supabase } from './supabase.js';
    import { initSidebar } from './sidebar.js?v=4';
    initSidebar({ active: 'ranking' });

    const tableEl = document.getElementById('ranking-table');
    const timerEl = document.getElementById('timer');
    let currentGame = 'overall';
    let currentUserId = null;

    // Auth check
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'auth.html';
    }
    currentUserId = session?.user?.id;

    // Tabs
    document.querySelectorAll('.ranking-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.ranking-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentGame = tab.dataset.game;
        loadRanking();
      });
    });

    // Calcula próxima segunda 9h BRT
    function getNextReset() {
      const now = new Date();
      // Converte para BRT (UTC-3)
      const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const dow = brt.getDay(); // 0=dom
      let daysUntilMon;
      if (dow === 0) daysUntilMon = 1;
      else if (dow === 1) {
        if (brt.getHours() < 9) daysUntilMon = 0;
        else daysUntilMon = 7;
      } else {
        daysUntilMon = 8 - dow;
      }
      const next = new Date(brt);
      next.setDate(next.getDate() + daysUntilMon);
      next.setHours(9, 0, 0, 0);
      return next;
    }

    function updateTimer() {
      const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const reset = getNextReset();
      const diff = reset - now;
      if (diff <= 0) {
        timerEl.textContent = 'Resetando...';
        setTimeout(() => { loadRanking(); updateTimer(); }, 2000);
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const parts = [];
      if (d > 0) parts.push(`${d}d`);
      parts.push(`${h}h`);
      parts.push(`${m}min`);
      timerEl.textContent = `Reseta em: ${parts.join(' ')}`;
    }

    const GAME_LABELS = {
      solitaire: 'Paciência',
      freecell: 'Freecell',
      spider: 'Spider Solitaire',
      checkers: 'Dama',
      memory: 'Memória',
      minesweeper: 'Campo Minado',
      sudoku: 'Sudoku',
      puzzle15: 'Puzzle 15',
      mahjong: 'Mahjong',
      sokoban: 'Sokoban',
      nonogram: 'Nonogram',
      lightsout: 'Lights Out',
      wordsearch: 'Caça-Palavras',
      chess: 'Xadrez',
      reversi: 'Reversi',
      go: 'Go',
      battleship: 'Batalha Naval',
      connect4: 'Conecte 4',
      tetris: 'Tetris',
      flappybird: 'Flappy Bird',
      pacman: 'Pac-Man',
      breakout: 'Breakout',
      dinorunner: 'Dino Runner',
      spaceinvaders: 'Space Invaders',
      snake: 'Cobrinha',
      game2048: '2048',
      cookieclicker: 'Cookie Clicker',
      pong: 'Pong',
      blackjack: 'Blackjack',
      truco: 'Truco',
      uno: 'Uno',
      tictactoe: 'Jogo da Velha',
      hangman: 'Forca',
      termo: 'Termo',
      anagram: 'Anagrama',
      numble: 'Numble',
      stopgame: 'Stop!',
      pyramid: 'Pirâmide'
    };

    // Jogos rankeados por tempo mais rápido (vitórias apenas)
    const TIME_RANKED = [
      'solitaire', 'freecell', 'spider', 'checkers', 'memory', 'minesweeper',
      'sudoku', 'puzzle15', 'mahjong', 'sokoban', 'nonogram', 'lightsout',
      'wordsearch', 'chess', 'reversi', 'go', 'battleship', 'connect4'
    ];

    // Jogos rankeados por maior pontuação (campo score)
    const SCORE_RANKED = [
      'tetris', 'flappybird', 'pacman', 'breakout', 'dinorunner',
      'spaceinvaders', 'snake', 'game2048', 'cookieclicker', 'pong'
    ];

    // Jogos rankeados por número de vitórias
    const WINS_RANKED = [
      'blackjack', 'truco', 'uno', 'tictactoe', 'hangman',
      'termo', 'anagram', 'numble', 'stopgame', 'pyramid'
    ];

    // Todos os jogos (38 no total)
    const ALL_GAMES = [...TIME_RANKED, ...SCORE_RANKED, ...WINS_RANKED];

    // Tabela de pontos por posição
    const POSITION_POINTS = [100, 85, 75, 60, 50, 42, 35, 28, 22, 16];
    function getPoints(pos) {
      if (pos <= 0) return 0;
      if (pos <= 10) return POSITION_POINTS[pos - 1];
      if (pos <= 20) return 10;
      return 0;
    }

    function formatRankTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || 'Jogador';
      return div.innerHTML;
    }

    // Calcula início da semana atual (segunda-feira às 9h BRT = UTC-3)
    function getWeekStart() {
      const now = new Date();
      const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const dow = brt.getDay(); // 0=dom
      let daysBack;
      if (dow === 0) daysBack = 6;
      else if (dow === 1) {
        daysBack = brt.getHours() < 9 ? 7 : 0;
      } else {
        daysBack = dow - 1;
      }
      const weekStart = new Date(brt);
      weekStart.setDate(weekStart.getDate() - daysBack);
      weekStart.setHours(9, 0, 0, 0);
      // Converter de volta para UTC para a query
      const offsetMs = -3 * 60 * 60 * 1000; // BRT = UTC-3
      return new Date(weekStart.getTime() - offsetMs);
    }

    // Busca ranking de um jogo específico por tempo (TIME_RANKED)
    async function fetchTimeRanking(gameId, weekStart) {
      const { data: rawData, error } = await supabase
        .from('game_stats')
        .select('user_id, time_seconds, profiles(display_name)')
        .eq('game', gameId)
        .eq('result', 'win')
        .gte('created_at', weekStart.toISOString())
        .order('time_seconds', { ascending: true });

      if (error || !rawData) return [];

      const best = {};
      const nameMap = {};
      for (const row of rawData) {
        if (!best[row.user_id] || row.time_seconds < best[row.user_id]) {
          best[row.user_id] = row.time_seconds;
          nameMap[row.user_id] = row.profiles?.display_name || 'Jogador';
        }
      }
      return Object.keys(best)
        .map(uid => ({ user_id: uid, display_name: nameMap[uid], best_time: best[uid] }))
        .sort((a, b) => a.best_time - b.best_time)
        .slice(0, 20);
    }

    // Busca ranking de um jogo específico por score (SCORE_RANKED)
    async function fetchScoreRanking(gameId, weekStart) {
      const { data: rawData, error } = await supabase
        .from('game_stats')
        .select('user_id, score, profiles(display_name)')
        .eq('game', gameId)
        .gt('score', 0)
        .gte('created_at', weekStart.toISOString())
        .order('score', { ascending: false });

      if (error || !rawData) return [];

      const best = {};
      const nameMap = {};
      for (const row of rawData) {
        if (!best[row.user_id] || row.score > best[row.user_id]) {
          best[row.user_id] = row.score;
          nameMap[row.user_id] = row.profiles?.display_name || 'Jogador';
        }
      }
      return Object.keys(best)
        .map(uid => ({ user_id: uid, display_name: nameMap[uid], best_score: best[uid] }))
        .sort((a, b) => b.best_score - a.best_score)
        .slice(0, 20);
    }

    // Busca ranking de um jogo específico por vitórias (WINS_RANKED)
    async function fetchWinsRanking(gameId, weekStart) {
      const { data: rawData, error } = await supabase
        .from('game_stats')
        .select('user_id, profiles(display_name)')
        .eq('game', gameId)
        .eq('result', 'win')
        .gte('created_at', weekStart.toISOString());

      if (error || !rawData) return [];

      const wins = {};
      const nameMap = {};
      for (const row of rawData) {
        wins[row.user_id] = (wins[row.user_id] || 0) + 1;
        nameMap[row.user_id] = row.profiles?.display_name || 'Jogador';
      }
      return Object.keys(wins)
        .map(uid => ({ user_id: uid, display_name: nameMap[uid], wins: wins[uid] }))
        .sort((a, b) => b.wins - a.wins)
        .slice(0, 20);
    }

    // Renderiza o ranking na tela
    function renderRanking(data, gameId, criterionHtml) {
      if (!data || data.length === 0) {
        const gameLabel = GAME_LABELS[gameId] || gameId;
        tableEl.innerHTML = `
          <div class="ranking-criterion">${criterionHtml}</div>
          <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhuma partida essa semana em ${gameLabel}.<br>Seja o primeiro!</div>
        `;
        return;
      }

      const isTimeRanked = TIME_RANKED.includes(gameId);
      const isScoreRanked = SCORE_RANKED.includes(gameId);

      const rows = data.map((row, i) => {
        const pos = i + 1;
        const posClass = pos <= 3 ? `pos-${pos}` : 'pos-other';
        const rowClass = pos <= 3 ? `top-${pos}` : '';
        const isMe = row.user_id === currentUserId;
        const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;

        let label;
        if (isTimeRanked) {
          label = `⏱ ${formatRankTime(row.best_time)}`;
        } else if (isScoreRanked) {
          label = `🎯 ${row.best_score} pts`;
        } else {
          const w = row.wins;
          label = `${w} ${w === 1 ? 'vitória' : 'vitórias'}`;
        }

        return `
          <div class="ranking-row ${rowClass}">
            <div class="ranking-pos ${posClass}">${medal}</div>
            <div class="ranking-name ${isMe ? 'is-me' : ''}">${escapeHtml(row.display_name)}${isMe ? ' (você)' : ''}</div>
            <div class="ranking-wins">${label}</div>
          </div>
        `;
      }).join('');

      tableEl.innerHTML = `<div class="ranking-criterion">${criterionHtml}</div>${rows}`;
    }

    // Renderiza o ranking geral
    function renderOverallRanking(playerPoints) {
      const sorted = Object.entries(playerPoints)
        .map(([uid, info]) => ({ user_id: uid, display_name: info.name, points: info.points, games: info.games }))
        .sort((a, b) => b.points - a.points)
        .slice(0, 20);

      if (sorted.length === 0) {
        tableEl.innerHTML = `
          <div class="ranking-criterion">🏆 Pontuação total entre jogos</div>
          <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhuma partida essa semana ainda.<br>Seja o primeiro!</div>
        `;
        return;
      }

      const rows = sorted.map((row, i) => {
        const pos = i + 1;
        const posClass = pos <= 3 ? `pos-${pos}` : 'pos-other';
        const rowClass = pos <= 3 ? `top-${pos}` : '';
        const isMe = row.user_id === currentUserId;
        const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;

        return `
          <div class="ranking-row ${rowClass}">
            <div class="ranking-pos ${posClass}">${medal}</div>
            <div class="ranking-name ${isMe ? 'is-me' : ''}">${escapeHtml(row.display_name)}${isMe ? ' (você)' : ''}</div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
              <div class="ranking-wins">🏆 ${row.points} pts</div>
              <div class="ranking-sub">${row.games} ${row.games === 1 ? 'jogo' : 'jogos'}</div>
            </div>
          </div>
        `;
      }).join('');

      tableEl.innerHTML = `<div class="ranking-criterion">🏆 Pontuação total entre jogos</div>${rows}`;
    }

    async function loadRanking() {
      tableEl.innerHTML = '<div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Carregando...</div>';

      const weekStart = getWeekStart();

      if (currentGame === 'overall') {
        await loadOverallRanking(weekStart);
        return;
      }

      if (TIME_RANKED.includes(currentGame)) {
        const data = await fetchTimeRanking(currentGame, weekStart);
        renderRanking(data, currentGame, '⏱ Menor tempo (vitórias)');
        return;
      }

      if (SCORE_RANKED.includes(currentGame)) {
        const data = await fetchScoreRanking(currentGame, weekStart);
        renderRanking(data, currentGame, '🎯 Maior pontuação');
        return;
      }

      if (WINS_RANKED.includes(currentGame)) {
        const data = await fetchWinsRanking(currentGame, weekStart);
        renderRanking(data, currentGame, '🏅 Mais vitórias');
        return;
      }

      // Fallback: usa RPC legada se existir
      const { data, error } = await supabase.rpc('get_weekly_ranking', { game_filter: currentGame });
      if (error) {
        console.error('Erro ao carregar ranking:', error);
        tableEl.innerHTML = '<div class="ranking-empty"><div class="ranking-empty-icon">⚠️</div>Erro ao carregar ranking</div>';
        return;
      }
      renderRanking(data, currentGame, '🏅 Mais vitórias');
    }

    async function loadOverallRanking(weekStart) {
      tableEl.innerHTML = `
        <div class="ranking-criterion">🏆 Pontuação total entre jogos</div>
        <div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Calculando ranking geral...<br><small style="color:#bbb">Isso pode levar alguns segundos</small></div>
      `;

      const playerPoints = {}; // uid -> { name, points, games }

      function addPoints(uid, name, pos) {
        const pts = getPoints(pos);
        if (pts === 0) return;
        if (!playerPoints[uid]) playerPoints[uid] = { name: name || 'Jogador', points: 0, games: 0 };
        playerPoints[uid].points += pts;
        playerPoints[uid].games += 1;
        // Manter o nome mais recente que não seja genérico
        if (name && name !== 'Jogador') playerPoints[uid].name = name;
      }

      // Buscar todos os jogos em paralelo com Promise.allSettled
      const allFetches = ALL_GAMES.map(async (gameId) => {
        try {
          let ranked = [];
          if (TIME_RANKED.includes(gameId)) {
            ranked = await fetchTimeRanking(gameId, weekStart);
          } else if (SCORE_RANKED.includes(gameId)) {
            ranked = await fetchScoreRanking(gameId, weekStart);
          } else if (WINS_RANKED.includes(gameId)) {
            ranked = await fetchWinsRanking(gameId, weekStart);
          }
          ranked.forEach((row, i) => {
            addPoints(row.user_id, row.display_name, i + 1);
          });
        } catch (e) {
          console.warn(`Erro ao buscar ranking de ${gameId}:`, e);
        }
      });

      await Promise.allSettled(allFetches);
      renderOverallRanking(playerPoints);
    }

    // Init
    loadRanking();
    updateTimer();
    setInterval(updateTimer, 60000);
  </script>
</body>
</html>
