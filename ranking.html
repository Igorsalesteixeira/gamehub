  <style>
    body { background: #0f0f1a; }

    /* ===== HERO ===== */
    .rank-hero {
      text-align: center;
      padding: 2rem 1rem 1.2rem;
    }
    .rank-hero h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .rank-timer {
      font-size: 0.85rem;

    /* ===== MAIN TABS ===== */
    .main-tabs-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1rem 0.8rem;
    }
    .main-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .main-tab {
      padding: 0.55rem 1.15rem;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .main-tab:hover {
      border-color: #ff6b35;
      color: #ff8f5e;
      background: rgba(255,107,53,0.1);
    }
    .main-tab.active {
      background: #ff6b35;
      border-color: #ff6b35;
      color: #fff;
    }
    .main-tab[data-cat="semanal"].active {
      background: #ffd700;
      border-color: #ffd700;
      color: #7a6200;
    }
    .main-tab[data-cat="nivel"].active {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-color: #7c3aed;
      color: #fff;
    }

    /* ===== SUB TABS ===== */
    .sub-tabs-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1rem 1rem;
      min-height: 0;
    }
    .sub-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .sub-tab {
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .sub-tab:hover { border-color: #ff6b35; color: #ff8f5e; }
    .sub-tab.active {
      background: rgba(255,107,53,0.18);
      border-color: #ff6b35;
      color: #ff8f5e;
    }

    /* ===== RANKING CARD ===== */
    .ranking-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }
    .ranking-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
    }

    .ranking-criterion {
      padding: 0.65rem 1.2rem;
      font-size: 0.75rem;
      font-weight: 800;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .ranking-row {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 0.8rem;
      transition: background 0.15s;
    }
    .ranking-row:last-child { border-bottom: none; }
    .ranking-row:hover { background: rgba(255,255,255,0.03); }
    .ranking-row.top-1 { background: rgba(255,215,0,0.07); }
    .ranking-row.top-2 { background: rgba(192,192,192,0.05); }
    .ranking-row.top-3 { background: rgba(205,127,50,0.07); }

    .rank-pos {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .pos-1 { background: #ffd700; color: #7a6200; }
    .pos-2 { background: #c0c0c0; color: #444; }
    .pos-3 { background: #cd7f32; color: #fff; }
    .pos-other { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35); font-size: 0.82rem; }

    .rank-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
    }

    .rank-info { flex: 1; min-width: 0; }
    .rank-name {
      font-weight: 700;
      font-size: 0.93rem;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-name.is-me { color: #ff8f5e; }
    .rank-sublabel {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      margin-top: 1px;
    }

    .rank-value { text-align: right; flex-shrink: 0; }
    .rank-main-val {
      font-weight: 800;
      font-size: 1rem;
      color: #ff8f5e;
      white-space: nowrap;
    }
    .rank-sub-val {
      font-size: 0.74rem;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      white-space: nowrap;
    }

    /* Level badge no ranking de nível */
    .rank-level-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(124,58,237,0.25);
      border: 1px solid rgba(168,85,247,0.4);
      font-size: 0.72rem;
      font-weight: 800;
      color: #c084fc;
      white-space: nowrap;
    }

    .ranking-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: rgba(255,255,255,0.35);
      font-size: 1rem;
    }
    .ranking-empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    @media (max-width: 480px) {
      .rank-hero h1 { font-size: 1.6rem; }
      .ranking-row { padding: 0.6rem 0.9rem; }
      .rank-avatar { width: 32px; height: 32px; font-size: 0.85rem; }
    }

    /* Botão adicionar amigo no ranking */
    .btn-add-friend {
      background: rgba(255,107,53,0.2) !important;
      border: 1px solid rgba(255,107,53,0.3) !important;
      color: #ff6b35 !important;
      transition: all 0.2s !important;

    .btn-add-friend:hover {

      border-color: rgba(34,197,94,0.4) !important;
      color: #22c55e !important;

  <script type="module">
    import { supabase } from './supabase.js?v=3';
    import { initSidebar } from './sidebar.js?v=7';
    initSidebar({ active: 'ranking' });

    // Auth
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; }
    const currentUserId = session?.user?.id;

    const tableEl  = document.getElementById('ranking-table');
    const timerEl  = document.getElementById('timer');
    const subTabsEl = document.getElementById('sub-tabs');

    // ===== GAME CATEGORIES =====
    const CATEGORIES = {
      cartas:     { label: '🃏 Cartas',     games: ['blackjack','buraco','cacheta','freecell','solitaire','pyramid','pife','poker','spider','sueca','truco','uno'] },
      puzzle:     { label: '🧩 Puzzle',     games: ['game2048','minesweeper','lightsout','mahjong','memory','nonogram','numble','puzzle15','sokoban','sudoku'] },
      arcade:     { label: '🕹️ Arcade',    games: ['breakout','bubble-shooter','snake','cookieclicker','dinorunner','flappybird','pacman','pong','spaceinvaders','tetris'] },
      casual:     { label: '🎪 Casual',    games: ['cookieclicker','sinuca'] },
      estrategia: { label: '♟️ Estratégia', games: ['battleship','connect4','checkers','domino','go','tictactoe','ludo','reversi','chess'] },
      palavras:   { label: '📝 Palavras',   games: ['anagram','wordsearch','hangman','stopgame','termo'] },
    };

    const GAME_META = {
      solitaire:    { label: '🃏 Paciência',      type: 'time' },
      freecell:     { label: '🂡 Freecell',        type: 'time' },
      spider:       { label: '🕷️ Spider',          type: 'time' },
      sueca:        { label: '🃏 Sueca',            type: 'score' },
      blackjack:    { label: '🃏 Blackjack',       type: 'wins' },
      poker:        { label: '🃏 Poker',            type: 'score', cat: 'cartas' },
      truco:        { label: '🂠 Truco',            type: 'wins' },
      buraco:       { label: '🃏 Buraco',           type: 'score' },
      cacheta:      { label: '🃏 Cacheta',          type: 'score' },
      uno:          { label: '🟥 Uno',             type: 'wins' },
      pyramid:      { label: '🔺 Pirâmide',        type: 'wins' },
      pife:         { label: '🃏 Pife',            type: 'wins' },
      memory:       { label: '🧠 Memória',         type: 'time' },
      minesweeper:  { label: '💣 Campo Minado',    type: 'time' },
      game2048:     { label: '🔢 2048',            type: 'score' },
      sudoku:       { label: '🔢 Sudoku',          type: 'time' },
      puzzle15:     { label: '🧩 Puzzle 15',       type: 'time' },
      nonogram:     { label: '🖼️ Nonogram',        type: 'time' },
      mahjong:      { label: '🀄 Mahjong',         type: 'time' },
      numble:       { label: '🔣 Numble',          type: 'wins' },
      lightsout:    { label: '💡 Lights Out',      type: 'time' },
      sokoban:      { label: '📦 Sokoban',         type: 'wins' },
      snake:        { label: '🐍 Cobrinha',        type: 'score' },
      tetris:       { label: '🧱 Tetris',          type: 'score' },
      flappybird:   { label: '🐦 Flappy Bird',     type: 'score' },
      pong:         { label: '🏓 Pong',            type: 'score' },
      breakout:     { label: '🧱 Breakout',        type: 'score' },
      dinorunner:   { label: '🦕 Dino Runner',     type: 'score' },
      spaceinvaders:{ label: '👾 Space Invaders',  type: 'score' },
      pacman:       { label: '🟡 Pac-Man',         type: 'score' },
      cookieclicker:{ label: '🍪 Cookie Clicker',  type: 'score' },
      sinuca:       { label: '🎱 Sinuca',            type: 'score' },
      checkers:     { label: '⚫ Dama',            type: 'time' },
      tictactoe:    { label: '❌ Jogo da Velha',   type: 'wins' },
      reversi:      { label: '⚪ Reversi',          type: 'wins' },
      chess:        { label: '♟️ Xadrez',          type: 'time' },
      battleship:   { label: '🚢 Batalha Naval',   type: 'time' },
      connect4:     { label: '🔴 Conecte 4',       type: 'wins' },
      go:           { label: '⚫ Go',              type: 'wins' },
      termo:        { label: '📝 Termo',           type: 'wins' },
      hangman:      { label: '🔤 Forca',           type: 'wins' },
      wordsearch:   { label: '🔍 Caça-Palavras',   type: 'time' },
      anagram:      { label: '🔀 Anagrama',        type: 'wins' },
      stopgame:          { label: '✋ Stop!',           type: 'wins' },
      'bubble-shooter':  { label: '🫧 Bubble Shooter',  type: 'score' },
      ludo:              { label: '🎲 Ludo',             type: 'wins' },
      domino:            { label: '🁣 Dominó',           type: 'wins' },
    };

    // ===== STATE =====
    let currentCat  = 'semanal';
    let currentGame = null; // null = cat-level ranking

    // ===== LEVELS (igual ao profile.html) =====
    const LEVELS = [
      { name: 'Novato',       min: 0,      icon: '🌱' },
      { name: 'Iniciante',    min: 200,    icon: '⭐' },
      { name: 'Jogador',      min: 600,    icon: '🎮' },
      { name: 'Experiente',   min: 1400,   icon: '💪' },
      { name: 'Veterano',     min: 3000,   icon: '🔥' },
      { name: 'Especialista', min: 6000,   icon: '⚡' },
      { name: 'Mestre',       min: 12000,  icon: '💎' },
      { name: 'Grão-Mestre',  min: 25000,  icon: '👑' },
      { name: 'Lenda',        min: 50000,  icon: '🌟' },
      { name: 'O Escolhido',  min: 100000, icon: '🏆' },
    ];
    function getLevel(xp) {
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (xp >= LEVELS[i].min) return { ...LEVELS[i], num: i + 1 };
      }
      return { ...LEVELS[0], num: 1 };
    }

    // ===== UTILS =====
    function avatarColor(name) {
      let hash = 0;
      for (const c of (name || '?')) hash = hash * 31 + c.charCodeAt(0);
      return `hsl(${Math.abs(hash) % 360}, 60%, 48%)`;
    }
    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t || 'Jogador';
      return d.innerHTML;
    }
    function fmtTime(s) {
      const m = Math.floor(s / 60);
      return `${m}:${(s % 60).toString().padStart(2, '0')}`;
    }
    function fmtNum(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
    }

    // ===== TIMER =====
    function getWeekStart() {
      const now = new Date();
      const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const dow = brt.getDay();
      let daysBack = dow === 0 ? 6 : dow === 1 ? (brt.getHours() < 9 ? 7 : 0) : dow - 1;
      const ws = new Date(brt);
      ws.setDate(ws.getDate() - daysBack);
      ws.setHours(9, 0, 0, 0);
      return new Date(ws.getTime() + 3 * 3600000); // convert BRT → UTC
    }
    function getNextReset() {
      const now = new Date();
      const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const dow = brt.getDay();
      let days = dow === 0 ? 1 : dow === 1 ? (brt.getHours() < 9 ? 0 : 7) : 8 - dow;
      const nr = new Date(brt);
      nr.setDate(nr.getDate() + days);
      nr.setHours(9, 0, 0, 0);
      return nr;
    }
    function updateTimer() {
      const now  = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
      const diff = getNextReset() - now;
      if (diff <= 0) { timerEl.textContent = 'Semanal · Resetando...'; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      timerEl.textContent = `Semanal reseta em: ${d > 0 ? d + 'd ' : ''}${h}h ${m}min`;
    }

    // ===== FETCH HELPERS =====

    // Busca nomes em lote — query separada evita problemas de RLS no embedded join
    async function fetchNames(uids) {
      if (!uids.length) return {};
      const { data } = await supabase.from('profiles')
        .select('user_id, display_name').in('user_id', uids);
      if (!data) return {};
      const map = {};
      for (const p of data) map[p.user_id] = p.display_name || 'Jogador';
      return map;
    }

    async function fetchTime(gameId, since) {
      const { data } = await supabase.from('game_stats')
        .select('user_id, time_seconds')
        .eq('game', gameId).eq('result', 'win').gte('created_at', since.toISOString())
        .order('time_seconds', { ascending: true }).limit(500);
      if (!data || !data.length) return [];
      const best = {};
      for (const r of data) {
        if (!best[r.user_id] || r.time_seconds < best[r.user_id])
          best[r.user_id] = r.time_seconds;
      }
      const names = await fetchNames(Object.keys(best));
      return Object.keys(best)
        .map(uid => ({ user_id: uid, name: names[uid] || 'Jogador', val: best[uid] }))
        .sort((a, b) => a.val - b.val).slice(0, 20);
    }

    async function fetchScore(gameId, since) {
      const { data } = await supabase.from('game_stats')
        .select('user_id, score')
        .eq('game', gameId).gt('score', 0).gte('created_at', since.toISOString())
        .order('score', { ascending: false }).limit(500);
      if (!data || !data.length) return [];
      const best = {};
      for (const r of data) {
        if (!best[r.user_id] || r.score > best[r.user_id])
          best[r.user_id] = r.score;
      }
      const names = await fetchNames(Object.keys(best));
      return Object.keys(best)
        .map(uid => ({ user_id: uid, name: names[uid] || 'Jogador', val: best[uid] }))
        .sort((a, b) => b.val - a.val).slice(0, 20);
    }

    async function fetchWins(gameId, since) {
      const { data } = await supabase.from('game_stats')
        .select('user_id')
        .eq('game', gameId).eq('result', 'win').gte('created_at', since.toISOString()).limit(1000);
      if (!data || !data.length) return [];
      const wins = {};
      for (const r of data) wins[r.user_id] = (wins[r.user_id] || 0) + 1;
      const names = await fetchNames(Object.keys(wins));
      return Object.keys(wins)
        .map(uid => ({ user_id: uid, name: names[uid] || 'Jogador', val: wins[uid] }))
        .sort((a, b) => b.val - a.val).slice(0, 20);
    }

    async function fetchGame(gameId, since) {
      const type = GAME_META[gameId]?.type || 'wins';
      if (type === 'time')  return { rows: await fetchTime(gameId, since),  type };
      if (type === 'score') return { rows: await fetchScore(gameId, since), type };
      return { rows: await fetchWins(gameId, since), type };
    }

    // ===== RENDER ROWS =====
    function buildRows(rows, type, criterion) {
      if (!rows.length) return `
        <div class="ranking-criterion">${criterion}</div>
        <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhuma partida essa semana.<br>Seja o primeiro!</div>
      `;
      const html = rows.map((row, i) => {
        const pos   = i + 1;
        const isMe  = row.user_id === currentUserId;
        const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
        const posClass = pos <= 3 ? `pos-${pos}` : 'pos-other';
        const rowClass = pos <= 3 ? `top-${pos}` : '';
        const color = avatarColor(row.name);
        const initial = escapeHtml((row.name || '?')[0].toUpperCase());
        let mainVal, subVal = '';
        if (type === 'time') {
          mainVal = `⏱ ${fmtTime(row.val)}`;
          subVal  = 'melhor tempo';
        } else if (type === 'score') {
          mainVal = `🎯 ${fmtNum(row.val)}`;
          subVal  = 'pontos';
        } else {
          mainVal = `${row.val} ${row.val === 1 ? 'vitória' : 'vitórias'}`;
        }
        return `
          <div class="ranking-row ${rowClass}">
            <div class="rank-pos ${posClass}">${medal}</div>
            <a href="perfil-publico.html?id=${row.user_id}" class="rank-avatar" style="background:${color};text-decoration:none;">${initial}</a>
            <div class="rank-info">
              <a href="perfil-publico.html?id=${row.user_id}" class="rank-name ${isMe ? 'is-me' : ''}" style="text-decoration:none;color:inherit;">${escapeHtml(row.name)}${isMe ? ' · você' : ''}</a>
              ${row.levelChip ? row.levelChip : ''}
            </div>
            <div class="rank-value" style="display:flex;align-items:center;gap:0.5rem;">
              <div>
                <div class="rank-main-val">${mainVal}</div>
                ${subVal ? `<div class="rank-sub-val">${subVal}</div>` : ''}
              </div>
              ${!isMe ? `<button class="btn-add-friend" data-user-id="${row.user_id}" title="Adicionar amigo" style="background:rgba(255,107,53,0.2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;transition:all 0.2s;">+</button>` : ''}
            </div>
          </div>`;
      }).join('');
      return `<div class="ranking-criterion">${criterion}</div>${html}`;
    }

    // ===== WEEKLY OVERALL =====
    const POSITION_PTS = [100,85,75,60,50,42,35,28,22,16];
    function pts(pos) {
      if (pos <= 10) return POSITION_PTS[pos-1];
      if (pos <= 20) return 10;
      return 0;
    }
    const ALL_GAMES = Object.keys(GAME_META);

    async function loadOverall(since) {
      tableEl.innerHTML = `
        <div class="ranking-criterion">🏆 Pontuação entre todos os jogos da semana</div>
        <div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Calculando...</div>`;
      const pp = {}; // uid → {name, points, games}
      await Promise.allSettled(ALL_GAMES.map(async gid => {
        try {
          const { rows } = await fetchGame(gid, since);
          rows.forEach((r, i) => {
            const p = pts(i + 1);
            if (!p) return;
            if (!pp[r.user_id]) pp[r.user_id] = { name: r.name || 'Jogador', points: 0, games: 0 };
            pp[r.user_id].points += p;
            pp[r.user_id].games++;
            if (r.name && r.name !== 'Jogador') pp[r.user_id].name = r.name;
          });
        } catch(e) {}
      }));
      const sorted = Object.entries(pp)
        .map(([uid, info]) => ({ user_id: uid, name: info.name, val: info.points, games: info.games }))
        .sort((a, b) => b.val - a.val).slice(0, 20);
      if (!sorted.length) {
        tableEl.innerHTML = `
          <div class="ranking-criterion">🏆 Pontuação entre todos os jogos da semana</div>
          <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhuma partida essa semana.<br>Seja o primeiro!</div>`;
        return;
      }
      const rows = sorted.map((row, i) => {
        const pos = i+1, isMe = row.user_id === currentUserId;
        const medal = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
        const posClass = pos<=3?`pos-${pos}`:'pos-other';
        const color = avatarColor(row.name);
        const initial = escapeHtml((row.name||'?')[0].toUpperCase());
        return `
          <div class="ranking-row ${pos<=3?`top-${pos}`:''}">
            <div class="rank-pos ${posClass}">${medal}</div>
            <div class="rank-avatar" style="background:${color}">${initial}</div>
            <div class="rank-info">
              <div class="rank-name ${isMe?'is-me':''}">${escapeHtml(row.name)}${isMe?' · você':''}</div>
              <div class="rank-sublabel">${row.games} ${row.games===1?'jogo':'jogos'} pontuados</div>
            </div>
            <div class="rank-value">
              <div class="rank-main-val">🏆 ${row.val}</div>
              <div class="rank-sub-val">pontos</div>
            </div>
          </div>`;
      }).join('');
      tableEl.innerHTML = `<div class="ranking-criterion">🏆 Pontuação entre todos os jogos da semana</div>${rows}`;
    }

    // ===== LEVEL RANKING (all-time) =====
    async function loadLevelRanking() {
      tableEl.innerHTML = `
        <div class="ranking-criterion">🌟 Nível global — XP acumulado de todos os tempos</div>
        <div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Calculando níveis...</div>`;
      // Step 1: aggregate stats including game column for unique-game trophy checks
      const { data, error } = await supabase.from('game_stats')
        .select('user_id, result, game').limit(50000);
      if (error || !data) {
        tableEl.innerHTML = `<div class="ranking-empty"><div class="ranking-empty-icon">⚠️</div>Erro ao carregar ranking de nível</div>`;
        return;
      }
      const stats = {};
      for (const r of data) {
        if (!stats[r.user_id]) stats[r.user_id] = { name: 'Jogador', total: 0, wins: 0, games: new Set(), hasName: false };
        stats[r.user_id].total++;
        if (r.result === 'win' || r.result === 'end') stats[r.user_id].wins++;
        if (r.game) stats[r.user_id].games.add(r.game);
      }
      // Step 2: fetch display names for all users (to compute hasName trophy)
      const allUids = Object.keys(stats);
      if (allUids.length > 0) {
        // Fetch in batches of 500 to avoid URL length limits
        for (let i = 0; i < allUids.length; i += 500) {
          const batch = allUids.slice(i, i + 500);
          const { data: profiles } = await supabase.from('profiles')
            .select('user_id, display_name').in('user_id', batch);
          if (profiles) profiles.forEach(p => {
            if (stats[p.user_id]) {
              stats[p.user_id].name = p.display_name || 'Jogador';
              stats[p.user_id].hasName = !!(p.display_name && p.display_name.trim().length >= 2);
            }
          });
        }
      }
      // Trophy XP — same logic as profile.html
      function calcTrophyXP(s) {
        const u = s.games.size;
        let xp = 0;
        if (s.total >= 1)   xp += 50;   // Bem-vindo
        if (s.wins >= 1)    xp += 75;   // Primeira Vitória
        if (s.hasName)      xp += 50;   // Com Identidade
        if (u >= 3)         xp += 50;   // Curioso
        if (u >= 10)        xp += 100;  // Explorador
        if (u >= 20)        xp += 200;  // Aventureiro
        if (u >= 30)        xp += 400;  // Colecionador
        if (u >= 38)        xp += 1000; // Mestre dos Jogos
        if (s.total >= 10)  xp += 50;   // 10 Partidas
        if (s.total >= 50)  xp += 100;  // 50 Partidas
        if (s.total >= 200) xp += 200;  // Veterano
        if (s.total >= 500) xp += 400;  // Implacável
        if (s.total >= 1000)xp += 800;  // Sem Vida
        if (s.wins >= 10)   xp += 75;   // 10 Vitórias
        if (s.wins >= 50)   xp += 150;  // 50 Vitórias
        if (s.wins >= 100)  xp += 300;  // 100 Vitórias
        if (s.wins >= 500)  xp += 600;  // Dominador
        if (s.wins >= 1000) xp += 1500; // Imbatível
        return xp;
      }
      const sorted = Object.entries(stats)
        .map(([uid, s]) => {
          const baseXP = s.total * 5 + s.wins * 15;
          const xp = baseXP + calcTrophyXP(s);
          const lv = getLevel(xp);
          return { user_id: uid, name: s.name, xp, level: lv, total: s.total, wins: s.wins };
        })
        .sort((a, b) => b.xp - a.xp).slice(0, 20);

      if (!sorted.length) {
        tableEl.innerHTML = `
          <div class="ranking-criterion">🌟 Nível global — XP acumulado de todos os tempos</div>
          <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhum jogador ainda.</div>`;
        return;
      }
      const rows = sorted.map((row, i) => {
        const pos = i+1, isMe = row.user_id === currentUserId;
        const medal = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
        const posClass = pos<=3?`pos-${pos}`:'pos-other';
        const color = avatarColor(row.name);
        const initial = escapeHtml((row.name||'?')[0].toUpperCase());
        return `
          <div class="ranking-row ${pos<=3?`top-${pos}`:''}">
            <div class="rank-pos ${posClass}">${medal}</div>
            <a href="perfil-publico.html?id=${row.user_id}" class="rank-avatar" style="background:${color};text-decoration:none;">${initial}</a>
            <div class="rank-info">
              <a href="perfil-publico.html?id=${row.user_id}" class="rank-name ${isMe?'is-me':''}" style="text-decoration:none;color:inherit;">${escapeHtml(row.name)}${isMe?' · você':''}</a>
              <div class="rank-sublabel">${row.total} partidas · ${row.wins} vitórias</div>
            </div>
            <div class="rank-value" style="display:flex;align-items:center;gap:0.5rem;">
              <div>
                <div class="rank-main-val">${row.level.icon} Nv ${row.level.num}</div>
                <div class="rank-sub-val">${row.level.name} · ${fmtNum(row.xp)} XP</div>
              </div>
              ${!isMe ? `<button class="btn-add-friend" data-user-id="${row.user_id}" title="Adicionar amigo" style="background:rgba(255,107,53,0.2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;transition:all 0.2s;">+</button>` : ''}
            </div>
          </div>`;
      }).join('');
      tableEl.innerHTML = `<div class="ranking-criterion">🌟 Nível global — XP acumulado de todos os tempos</div>${rows}`;
    }

    // ===== CATEGORY OVERALL (soma vitórias/pts dentro da categoria) =====
    async function loadCategoryOverall(catKey, since) {
      const cat = CATEGORIES[catKey];
      tableEl.innerHTML = `
        <div class="ranking-criterion">📊 Melhor desempenho geral em ${cat.label}</div>
        <div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Calculando...</div>`;
      const pp = {};
      await Promise.allSettled(cat.games.map(async gid => {
        try {
          const { rows } = await fetchGame(gid, since);
          rows.forEach((r, i) => {
            const p = pts(i+1);
            if (!p) return;
            if (!pp[r.user_id]) pp[r.user_id] = { name: r.name || 'Jogador', points: 0, games: 0 };
            pp[r.user_id].points += p;
            pp[r.user_id].games++;
            if (r.name && r.name !== 'Jogador') pp[r.user_id].name = r.name;
          });
        } catch(e) {}
      }));
      const sorted = Object.entries(pp)
        .map(([uid, info]) => ({ user_id: uid, name: info.name, val: info.points, games: info.games }))
        .sort((a, b) => b.val - a.val).slice(0, 20);
      if (!sorted.length) {
        tableEl.innerHTML = `
          <div class="ranking-criterion">📊 Melhor desempenho geral em ${cat.label}</div>
          <div class="ranking-empty"><div class="ranking-empty-icon">🏜️</div>Nenhuma partida essa semana.<br>Seja o primeiro!</div>`;
        return;
      }
      const rows = sorted.map((row, i) => {
        const pos = i+1, isMe = row.user_id === currentUserId;
        const medal = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
        const posClass = pos<=3?`pos-${pos}`:'pos-other';
        const color = avatarColor(row.name);
        const initial = escapeHtml((row.name||'?')[0].toUpperCase());
        return `
          <div class="ranking-row ${pos<=3?`top-${pos}`:''}">
            <div class="rank-pos ${posClass}">${medal}</div>
            <div class="rank-avatar" style="background:${color}">${initial}</div>
            <div class="rank-info">
              <div class="rank-name ${isMe?'is-me':''}">${escapeHtml(row.name)}${isMe?' · você':''}</div>
              <div class="rank-sublabel">${row.games} ${row.games===1?'jogo':'jogos'} pontuados</div>
            </div>
            <div class="rank-value">
              <div class="rank-main-val">🏆 ${row.val}</div>
              <div class="rank-sub-val">pontos</div>
            </div>
          </div>`;
      }).join('');
      tableEl.innerHTML = `<div class="ranking-criterion">📊 Melhor desempenho geral em ${cat.label}</div>${rows}`;
    }

    // ===== LOAD RANKING DISPATCHER =====
    async function loadRanking() {
      tableEl.innerHTML = '<div class="ranking-empty"><div class="ranking-empty-icon">⏳</div>Carregando...</div>';
      const since = getWeekStart();

      if (currentCat === 'semanal') { await loadOverall(since); return; }
      if (currentCat === 'nivel')   { await loadLevelRanking(); return; }

      if (currentGame) {
        const { rows, type } = await fetchGame(currentGame, since);
        const meta = GAME_META[currentGame];
        const criterion = type === 'time' ? '⏱ Menor tempo (vitórias)'
                        : type === 'score' ? '🎯 Maior pontuação'
                        : '🏅 Mais vitórias';
        tableEl.innerHTML = buildRows(rows, type, criterion);
      } else {
        await loadCategoryOverall(currentCat, since);
      }
    }

    // ===== SUB-TABS BUILDER =====
    function buildSubTabs(catKey) {
      subTabsEl.innerHTML = '';
      if (!CATEGORIES[catKey]) return;
      const cat = CATEGORIES[catKey];

      // "Geral da categoria" button
      const allBtn = document.createElement('button');
      allBtn.className = 'sub-tab' + (currentGame === null ? ' active' : '');
      allBtn.textContent = '📊 Geral';
      allBtn.onclick = () => {
        currentGame = null;
        subTabsEl.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        loadRanking();
      };
      subTabsEl.appendChild(allBtn);

      // Individual game buttons
      cat.games.forEach(gid => {
        const meta = GAME_META[gid];
        if (!meta) return;
        const btn = document.createElement('button');
        btn.className = 'sub-tab' + (currentGame === gid ? ' active' : '');
        btn.textContent = meta.label;
        btn.onclick = () => {
          currentGame = gid;
          subTabsEl.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadRanking();
        };
        subTabsEl.appendChild(btn);
      });
    }

    // ===== MAIN TAB EVENTS =====
    document.querySelectorAll('.main-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCat  = tab.dataset.cat;
        currentGame = null;
        subTabsEl.innerHTML = '';
        if (CATEGORIES[currentCat]) buildSubTabs(currentCat);
        loadRanking();
      });
    });

    // ===== REFRESH BUTTON =====
    const btnRefresh = document.getElementById('btn-refresh');
    btnRefresh.addEventListener('click', () => {
      btnRefresh.textContent = '⏳';
      btnRefresh.disabled = true;
      loadRanking().finally(() => {
        btnRefresh.textContent = '🔄 Atualizar';
        btnRefresh.disabled = false;
      });
    });

    // ===== FRIEND BUTTONS =====
    tableEl.addEventListener('click', async (e) => {
      if (e.target.classList.contains('btn-add-friend')) {
        const userId = e.target.dataset.userId;
        if (!userId) return;

        // Import dinâmico do social.js
        try {
          const { sendFriendRequest } = await import('./social.js?v=1');
          const { data, error } = await sendFriendRequest(userId);

          if (error) {
            if (error.message.includes('Já existe')) {
              e.target.textContent = '✓';
              e.target.classList.add('added');
              e.target.title = 'Solicitação já enviada';
            } else {
              alert('Erro: ' + error.message);
            }
          } else {
            e.target.textContent = '✓';
            e.target.classList.add('added');
            e.target.title = 'Solicitação enviada!';

            // Mostrar toast se disponível
            if (window.Toast) {
              Toast.success('Solicitação de amizade enviada!', 3000);
            }
          }
        } catch (err) {
          console.error('Erro ao adicionar amigo:', err);
          alert('Erro ao enviar solicitação. Tente novamente.');
        }
      }
    });

    // ===== INIT =====
    loadRanking();
    updateTimer();
    setInterval(updateTimer, 60000);
    // Auto-refresh a cada 2 minutos
    setInterval(() => loadRanking(), 120000);
  </script>
</body>
</html>
