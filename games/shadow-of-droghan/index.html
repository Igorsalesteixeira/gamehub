<canvas id="gameCanvas"></canvas>

    <div class="load-title">The Shadow of Droghan</div>
    <div class="load-bar-bg"><div class="load-bar" id="loadBar"></div></div>
    <div class="load-text" id="loadText">Gerando dungeon...</div>
</div>
<!-- GDD §22: Supabase + Auth para save nuvem (graceful fallback se offline) -->
<script type="module">
  try {
    const { supabase } = await import('../../supabase.js');
    const { getCurrentUser } = await import('../shared/auth-guard.js');
    window._supabase = supabase;
    window._getCurrentUser = getCurrentUser;
  } catch(e) {
    console.warn('[Droghan] Supabase não disponível, save apenas local.', e);
  }
</script>
<!-- game.js stub para compatibilidade com validação -->
<script src="game.js?v=21"></script>
