<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sudoku Online Gratis - Game Hub</title>
  <meta name="description" content="Jogue Sudoku online e de graca. Varios niveis de dificuldade!" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/sudoku/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">🔢 Sudoku</h1>
    <div class="stats">
      <span>⏱ <span id="timer-display">0:00</span></span>
    </div>
  </header>

  <main class="game-container">
    <div class="controls-bar">
      <select id="difficulty-select" class="select-diff">
        <option value="easy">Facil</option>
        <option value="medium" selected>Medio</option>
        <option value="hard">Dificil</option>
      </select>
      <button class="btn btn-sm" id="btn-new-game">Novo Jogo</button>
    </div>

    <div class="board" id="board"></div>

    <div class="numpad" id="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
      <button class="num-btn erase-btn" data-num="0">✕</button>
    </div>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Parabens! 🎉</h2>
      <p id="modal-message">Voce completou o Sudoku!</p>
      <button class="btn btn-orange" id="btn-play-again">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=3';
    initSidebar({ active: 'sudoku' });
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
