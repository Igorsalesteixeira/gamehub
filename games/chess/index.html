<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">&#9812; Xadrez</h1>
    <div class="stats">
      <span>&#9201; <span id="timer-display">00:00</span></span>
    </div>
  </header>

  <main class="game-container">
    <div class="turn-indicator" id="turn-indicator">Sua vez (Brancas)</div>
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
    <div class="controls">
      <button class="btn btn-orange" id="btn-new-game">Novo Jogo</button>
    </div>

      <h2 class="modal-title">Promocao</h2>

  <div class="modal-overlay" id="modal-overlay">

      <div class="modal-icon" id="modal-icon">&#127942;</div>

      <p class="modal-msg" id="modal-msg">Resultado</p>
