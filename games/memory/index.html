     crossorigin="anonymous"></script>
</head>
<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">🧠 Memoria</h1>
    <div class="stats">
      <span>🎯 <span id="moves-display">0</span></span>
      <span>⏱️ <span id="timer-display">0:00</span></span>
    </div>
  </header>

  <div class="controls-bar">
    <select id="difficulty-select">
      <option value="easy">Facil (4x3)</option>
      <option value="medium" selected>Medio (4x4)</option>
      <option value="hard">Dificil (6x4)</option>
    </select>
    <button class="btn btn-orange btn-sm" id="btn-new-game">Novo Jogo</button>
  </div>

  <div class="game-container">
    <div class="board" id="board"></div>
  </div>

  <!-- Modal de vitoria -->
  <div class="modal-overlay hidden" id="victory-modal">
    <div class="modal-content">
      <div class="modal-icon">🎉</div>
      <h2>Parabens!</h2>
      <p>Voce encontrou todos os pares!</p>
      <div class="modal-stats">
        <div class="modal-stat">
          <span class="modal-stat-label">Movimentos</span>
          <span class="modal-stat-value" id="final-moves">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">Tempo</span>
          <span class="modal-stat-value" id="final-time">0:00</span>
        </div>
      </div>
      <button class="btn btn-orange" id="btn-play-again">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=3';
    initSidebar({ active: 'memoria' });
  </script>
  <script type="module" src="game.js?v=1"></script>
</body>
</html>
