<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pong Online Gratis - Game Hub</title>
  <meta name="description" content="Jogue Pong online e de graca contra o computador!" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/pong/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">🏓 Pong</h1>
    <div class="stats">
      <span>Primeiro a <strong>5</strong></span>
    </div>
  </header>

  <main class="game-container">
    <canvas id="game-canvas"></canvas>
    <div class="mobile-controls">
      <button class="ctrl-btn" id="btn-up">▲</button>
      <button class="ctrl-btn" id="btn-down">▼</button>
    </div>
    <button class="btn btn-orange" id="btn-new-game">Novo Jogo</button>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Fim de Jogo!</h2>
      <p id="modal-message"></p>
      <button class="btn btn-orange" id="btn-play-again">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=3';
    initSidebar({ active: 'pong' });
  </script>
  <script type="module" src="game.js"></script>

</html>
