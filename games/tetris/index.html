<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tetris Online Gratis - Games Hub</title>
  <meta name="description" content="Jogue Tetris online e de graca. Encaixe as pecas, complete linhas e alcance a maior pontuacao!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=14" />
  <meta name="theme-color" content="#00d4ff" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LNTD0KNJ6T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LNTD0KNJ6T');
  </script>
</head>
<body>
  <header class="topbar">
    <a href="../../index.html" class="btn-back">← Voltar</a>
    <h1 class="game-title">Tetris</h1>
    <div class="score-display">
      <span>⭐</span>
      <span id="score">0</span>
    </div>
  </header>

  <main class="game-wrapper">
    <!-- Sidebar com info -->
    <aside class="sidebar">
      <div class="info-box">
        <div class="info-label">Proxima</div>
        <canvas id="next-canvas" width="100" height="100"></canvas>
      </div>
      <div class="info-box">
        <div class="info-label">Nivel</div>
        <div class="info-value" id="level">1</div>
      </div>
      <div class="info-box">
        <div class="info-label">Linhas</div>
        <div class="info-value" id="lines">0</div>
      </div>
    </aside>

    <!-- Area do jogo -->
    <div class="game-area">
      <canvas id="game-canvas" width="300" height="600"></canvas>

      <!-- Overlay -->
      <div class="overlay hidden" id="overlay">
        <div class="modal">
          <h2 id="overlay-title">Tetris</h2>
          <p id="overlay-msg">Use as setas para jogar</p>
          <div id="overlay-score"></div>
          <button class="btn" id="btn-start">Jogar</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Controles mobile -->
  <div class="mobile-controls">
    <div class="ctrl-row ctrl-top">
      <button class="ctrl-btn" data-action="rotate">↻</button>
      <button class="ctrl-btn ctrl-drop" data-action="drop">⬇</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" data-action="left">←</button>
      <button class="ctrl-btn" data-action="down">↓</button>
      <button class="ctrl-btn" data-action="right">→</button>
    </div>
  </div>

  <script type="module">import { initSidebar } from '../../sidebar.js?v=7'; initSidebar({ active: 'tetris' });</script>
  <script type="module" src="game.js?v=14"></script>
</body>
</html>
