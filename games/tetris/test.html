<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTE - Tetris</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #0a0a1a;
      color: #00d4ff;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #00d4ff;
    }
    .pass { background: rgba(0, 212, 255, 0.2); }
    .fail { background: rgba(255, 0, 0, 0.2); color: #f00; border-color: #f00; }
    iframe {
      width: 100%;
      height: 600px;
      border: 2px solid #00d4ff;
      margin-top: 20px;
    }
    h1 { color: #00ffff; }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      background: #00d4ff;
      color: #000;
      border: none;
      font-weight: bold;
    }
    .grid-demo {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      background: rgba(0, 212, 255, 0.1);
      padding: 20px;
      margin: 20px 0;
    }
    .grid-demo .sidebar {
      width: 100px;
      background: rgba(255, 0, 255, 0.3);
      padding: 10px;
      text-align: center;
    }
    .grid-demo .game {
      background: rgba(0, 255, 0, 0.3);
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🎮 TESTE - Tetris CSS Grid</h1>

  <div id="results"></div>

  <button onclick="runTests()">Rodar Testes</button>
  <button onclick="document.getElementById('game-frame').src='index.html'">Carregar Jogo</button>

  <h2>Estrutura Grid Esperada:</h2>
  <div class="grid-demo">
    <div class="sidebar">Sidebar</div>
    <div class="game">Game Area (Centralizado)</div>
  </div>

  <h2>Preview do Jogo:</h2>
  <iframe id="game-frame" src=""></iframe>

  <script>
    function addResult(name, passed, message) {
      const div = document.createElement('div');
      div.className = `test-result ${passed ? 'pass' : 'fail'}`;
      div.innerHTML = `${passed ? '✅' : '❌'} ${name}: ${message}`;
      document.getElementById('results').appendChild(div);
    }

    async function runTests() {
      document.getElementById('results').innerHTML = '';

      // Test 1: Arquivos existem
      try {
        const html = await fetch('index.html');
        const css = await fetch('style.css');
        const js = await fetch('game.js');
        addResult('Arquivos existem', html.ok && css.ok && js.ok, 'Todos os arquivos carregam');
      } catch (e) {
        addResult('Arquivos existem', false, e.message);
      }

      // Test 2: CSS usa Grid
      try {
        const css = await fetch('style.css').then(r => r.text());
        const hasGrid = css.includes('display: grid') || css.includes('display:grid');
        addResult('CSS Grid', hasGrid, hasGrid ? 'Grid encontrado' : 'Grid nao encontrado!');
      } catch (e) {
        addResult('CSS Grid', false, e.message);
      }

      // Test 3: Grid template columns
      try {
        const css = await fetch('style.css').then(r => r.text());
        const hasTemplate = css.includes('grid-template-columns');
        addResult('Grid template', hasTemplate, hasTemplate ? 'Template definido' : 'Template nao definido!');
      } catch (e) {
        addResult('Grid template', false, e.message);
      }

      // Test 4: Centralizacao
      try {
        const css = await fetch('style.css').then(r => r.text());
        const hasCenter = css.includes('justify-content: center') || css.includes('place-items: center');
        addResult('Centralizacao', hasCenter, hasCenter ? 'Centralizacao definida' : 'Centralizacao nao definida!');
      } catch (e) {
        addResult('Centralizacao', false, e.message);
      }

      // Test 5: HTML estrutura correta
      try {
        const html = await fetch('index.html').then(r => r.text());
        const hasWrapper = html.includes('game-wrapper');
        const hasSidebar = html.includes('sidebar');
        const hasGameArea = html.includes('game-area');
        addResult('Estrutura HTML', hasWrapper && hasSidebar && hasGameArea,
          hasWrapper && hasSidebar && hasGameArea ? 'Estrutura correta' : 'Estrutura incompleta!');
      } catch (e) {
        addResult('Estrutura HTML', false, e.message);
      }

      // Test 6: Sem !important excessivo
      try {
        const css = await fetch('style.css').then(r => r.text());
        const importantCount = (css.match(/!important/g) || []).length;
        addResult('Sem !important excessivo', importantCount < 5,
          `${importantCount} !important encontrados (max 5 recomendado)`);
      } catch (e) {
        addResult('Sem !important', false, e.message);
      }

      // Test 7: Responsividade mobile
      try {
        const css = await fetch('style.css').then(r => r.text());
        const hasMedia = css.includes('@media');
        addResult('Responsividade', hasMedia, hasMedia ? 'Media queries presentes' : 'Sem media queries!');
      } catch (e) {
        addResult('Responsividade', false, e.message);
      }

      // Test 8: JS simplificado
      try {
        const js = await fetch('game.js').then(r => r.text());
        const hasParticles = js.includes('ParticleSystem');
        addResult('JS sem particulas', !hasParticles, hasParticles ? 'Ainda tem particulas!' : 'JS limpo');
      } catch (e) {
        addResult('JS sem particulas', false, e.message);
      }
    }

    // Auto-run
    runTests();
  </script>
</body>
</html>
