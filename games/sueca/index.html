<body>
  <div id="game-container">
    <!-- Mesa de jogo -->
    <div id="table-area">
      <div id="opponent-top" class="player-hand opponent">
        <div class="player-name">Parceiro</div>
        <div class="cards-back"></div>
      </div>
      <div id="opponent-left" class="player-hand opponent">
        <div class="player-name">Adversário 1</div>
        <div class="cards-back"></div>
      </div>
      <div id="opponent-right" class="player-hand opponent">
        <div class="player-name">Adversário 2</div>
        <div class="cards-back"></div>
      </div>

      <!-- Área de jogo central -->
      <div id="play-area">
        <div id="trump-indicator">Trunfo: <span id="trump-suit">♠</span></div>
        <div id="trick-area">
          <div id="card-top" class="played-card"></div>
          <div id="card-left" class="played-card"></div>
          <div id="card-right" class="played-card"></div>
          <div id="card-bottom" class="played-card"></div>
        </div>
        <div id="score-board">
          <div>Nós: <span id="our-score">0</span></div>
          <div>Eles: <span id="their-score">0</span></div>
        </div>
      </div>
    </div>

    <!-- Mão do jogador -->
    <div id="player-hand"></div>

    <!-- Overlay -->
    <div id="overlay">
      <h1>Sueca</h1>
      <p>Jogo de cartas português - 2 duplas</p>
      <div id="game-modes">
        <button id="btn-single" class="mode-btn">Jogar vs Bots</button>
        <button id="btn-multi" class="mode-btn">Multiplayer</button>
      </div>
      <div id="game-rules" class="hidden">
        <h3>Regras:</h3>
        <ul>
          <li>7 > 6 > A > 5 > 4 > 3 > 2 > Q > J > K</li>
          <li>Primeira carta virada = trunfo</li>
          <li>4+ voltas = +40 pontos</li>
          <li>Cartas: A=11, 7=10, K=4, J=3, Q=2</li>
        </ul>
        <button id="btn-start">Começar</button>
      </div>
    </div>

    <!-- Indicador de vez -->
    <div id="turn-indicator" class="hidden">Sua vez!</div>

    <!-- Placar final -->
    <div id="end-screen" class="hidden">
      <h2>Fim da Partida</h2>
      <div id="final-scores"></div>
      <button id="btn-new-game">Nova Partida</button>
    </div>
  </div>
