     crossorigin="anonymous"></script>

<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">&#127183; Blackjack</h1>
    <div class="stats">
      <span>Saldo: <strong id="balance-display">1000</strong></span>
      <span>Aposta: <strong id="bet-display">10</strong></span>
    </div>
  </header>

  <main class="game-area">
    <!-- Dealer -->
    <section class="hand-section dealer-section">
      <div class="hand-label">Dealer <span id="dealer-score" class="score-badge"></span></div>
      <div class="hand" id="dealer-hand"></div>
    </section>

    <!-- Player -->
    <section class="hand-section player-section">
      <div class="hand-label">Jogador <span id="player-score" class="score-badge"></span></div>
      <div class="hand" id="player-hand"></div>
    </section>

    <!-- Bet controls -->
    <div class="bet-controls" id="bet-controls">
      <label for="bet-input">Aposta:</label>
      <div class="bet-row">
        <button class="btn btn-sm" id="bet-minus">-</button>
        <input type="number" id="bet-input" value="10" min="1" max="1000" />
        <button class="btn btn-sm" id="bet-plus">+</button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn btn-green" id="btn-hit" disabled>&#127183; Comprar</button>
      <button class="btn btn-red" id="btn-stand" disabled>&#9995; Parar</button>
      <button class="btn btn-blue" id="btn-double" disabled>&#10006;2 Dobrar</button>
      <button class="btn btn-orange" id="btn-new">&#9889; Novo Jogo</button>
    </div>
  </main>

  <!-- Result modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon" id="modal-icon"></div>
      <h2 id="modal-title"></h2>
      <p id="modal-message"></p>
      <button class="btn btn-orange" id="modal-btn">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">import { initSidebar } from '../../sidebar.js?v=2'; initSidebar({ active: 'blackjack' });</script>
  <script type="module" src="game.js"></script>
</body>
</html>
