<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go (Baduk) - Game Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609" crossorigin="anonymous"></script>
</head>
<body>
  <div class="topbar"><a href="../../index.html" class="back-btn">← Voltar</a><h1>⚫ Go (9x9)</h1></div>
  <div id="game-container">
    <div class="info">
      <span id="turn">Sua vez (Preto)</span> ·
      <span>Preto: <strong id="black-score">0</strong></span> ·
      <span>Branco: <strong id="white-score">0</strong></span>
    </div>
    <div class="board" id="board"></div>
    <div class="actions">
      <button class="btn" id="pass-btn">Passar</button>
      <button class="btn btn-secondary" id="restart">Novo Jogo</button>
    </div>
  </div>
  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal"><p id="modal-msg"></p><button class="btn" id="modal-btn">Jogar Novamente</button></div>
  </div>
  <script type="module" src="game.js"></script>
  <script type="module">import { initSidebar } from '../../sidebar.js?v=4'; initSidebar({ active: 'go' });</script>
</body>
</html>
