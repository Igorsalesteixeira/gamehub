<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uno Online Gratis - Game Hub</title>
  <meta name="description" content="Jogue Uno online e de graca contra 3 computadores. Regras oficiais com cartas especiais!" />
  <meta name="keywords" content="uno online, uno gratis, jogo de cartas online, uno navegador" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/uno/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Uno Online Gratis - Game Hub" />
  <meta property="og:description" content="Jogue Uno online e de graca contra 3 CPUs!" />
  <meta property="og:url" content="https://igorsalesteixeira.github.io/gamehub/games/uno/" />
  <meta property="og:locale" content="pt_BR" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609"
     crossorigin="anonymous"></script>
</head>
<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">&#127183; Uno</h1>
    <div class="stats">
      <span>Direcao: <strong id="direction-display">&#8594;</strong></span>
    </div>
  </header>

  <main class="game-area">
    <div class="opponents">
      <div class="opponent" id="opponent-1">
        <div class="opp-name">CPU 1</div>
        <div class="opp-cards" id="opp-cards-1"></div>
        <div class="opp-count"><span id="opp-count-1">7</span> cartas</div>
      </div>
      <div class="opponent" id="opponent-2">
        <div class="opp-name">CPU 2</div>
        <div class="opp-cards" id="opp-cards-2"></div>
        <div class="opp-count"><span id="opp-count-2">7</span> cartas</div>
      </div>
      <div class="opponent" id="opponent-3">
        <div class="opp-name">CPU 3</div>
        <div class="opp-cards" id="opp-cards-3"></div>
        <div class="opp-count"><span id="opp-count-3">7</span> cartas</div>
      </div>
    </div>

    <div class="table-center">
      <div class="pile draw-pile" id="draw-pile">
        <div class="card-back">UNO</div>
        <div class="pile-label">Comprar</div>
      </div>
      <div class="pile discard-pile" id="discard-pile">
        <div class="pile-label">Descarte</div>
      </div>
    </div>

    <div class="player-section">
      <div class="zone-label">Suas Cartas <span id="uno-badge" class="uno-badge" style="display:none">UNO!</span></div>
      <div class="player-hand" id="player-hand"></div>
    </div>

    <div class="actions">
      <button class="btn btn-orange" id="btn-draw">&#127183; Comprar Carta</button>
      <button class="btn btn-green" id="btn-uno" style="display:none">&#128227; UNO!</button>
      <button class="btn btn-blue" id="btn-new" style="display:none">Nova Partida</button>
    </div>

    <div id="message" class="message"></div>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-icon" id="modal-icon"></div>
      <h2 id="modal-title"></h2>
      <p id="modal-message"></p>
      <button class="btn btn-orange" id="modal-btn">Jogar Novamente</button>
    </div>
  </div>

  <div class="color-picker-overlay" id="color-picker-overlay" style="display:none">
    <div class="color-picker">
      <h3>Escolha uma cor</h3>
      <div class="color-options">
        <button class="color-btn color-red" data-color="red">Vermelho</button>
        <button class="color-btn color-blue" data-color="blue">Azul</button>
        <button class="color-btn color-green" data-color="green">Verde</button>
        <button class="color-btn color-yellow" data-color="yellow">Amarelo</button>
      </div>
    </div>
  </div>

  <script type="module">import { initSidebar } from '../../sidebar.js?v=3'; initSidebar({ active: 'uno' });</script>
  <script type="module" src="game.js?v=1"></script>
</body>
</html>
