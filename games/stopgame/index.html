<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <div class="topbar"><a href="../../index.html" class="back-btn">← Voltar</a><h1>✋ Stop!</h1></div>

    <div class="round-info">
      <span class="letter-display" id="letter">A</span>
      <span class="timer" id="timer">60</span>
      <span>Rodada: <strong id="round">1</strong></span>

      <button class="btn" id="stop-btn">STOP!</button>

    </div>
    <div class="results" id="results" style="display:none"></div>
