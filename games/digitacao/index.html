<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">Digitacao Turbo</h1>
    <div class="stats">
      <div class="score-box">
        <span class="score-label">WPM</span>
        <span id="wpm-display" class="score-value neon-text">0</span>
      </div>
      <div class="score-box best">
        <span class="score-label">Melhor</span>
        <span id="best-display" class="score-value">0</span>
      </div>
    </div>
  </header>

  <div class="game-container">
    <!-- Pista de corrida canvas -->
    <canvas id="race-canvas"></canvas>

    <!-- Area de texto para digitacao -->
    <div class="typing-area" id="typing-area">
      <div class="phrase-display" id="phrase-display"></div>
      <input type="text" id="typing-input" class="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Digite aqui..." />
      <div class="typing-stats" id="typing-stats">
        <span id="timer-display">00:00</span>
        <span id="accuracy-display">100%</span>
        <span id="progress-display">0/10</span>
      </div>
    </div>

    <!-- Chuva de palavras container -->
    <div class="rain-container" id="rain-container" style="display:none;">
      <canvas id="rain-canvas"></canvas>
      <input type="text" id="rain-input" class="typing-input rain-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Digite a palavra..." />
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay glass-overlay" id="overlay">
      <div class="modal glass-modal">
        <div class="modal-icon" id="overlay-icon">&#9000;</div>
        <h2 id="overlay-title" class="modal-title">Digitacao Turbo</h2>
        <p id="overlay-msg" class="modal-subtitle">Teste sua velocidade de digitacao!</p>

        <!-- Selecao de modo -->
        <div class="mode-select" id="mode-select">
          <button type="button" class="btn btn-mode active" data-mode="classic">Classico</button>
          <button type="button" class="btn btn-mode" data-mode="marathon">Maratona</button>
          <button type="button" class="btn btn-mode" data-mode="rain">Chuva de Palavras</button>
        </div>
        <p class="mode-desc" id="mode-desc">10 frases. Digite cada uma o mais rapido possivel.</p>

        <div id="overlay-score" class="overlay-score neon-score"></div>
        <button type="button" class="btn btn-primary" id="btn-start">Jogar</button>
        <button type="button" class="btn btn-whatsapp" id="btn-share" style="display:none; margin-top: 12px;">Compartilhar</button>
      </div>
    </div>
  </div>
