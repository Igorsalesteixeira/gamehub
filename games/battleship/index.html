<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Batalha Naval Online Gratis - Game Hub</title>
  <meta name="description" content="Jogue Batalha Naval (Battleship) online e de graca contra o computador. Posicione seus navios e afunde a frota inimiga!" />
  <meta name="keywords" content="batalha naval online, battleship online, batalha naval gratis, jogo de batalha naval" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/battleship/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Batalha Naval Online Gratis - Game Hub" />
  <meta property="og:description" content="Jogue Batalha Naval online e de graca contra o computador!" />
  <meta property="og:url" content="https://igorsalesteixeira.github.io/gamehub/games/battleship/" />
  <meta property="og:image" content="https://igorsalesteixeira.github.io/gamehub/og-image.png" />
  <meta property="og:locale" content="pt_BR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Batalha Naval Online Gratis - Game Hub" />
  <meta name="twitter:description" content="Jogue Batalha Naval online e de graca contra o computador!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609"
     crossorigin="anonymous"></script>
</head>
<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">&#128674; Batalha Naval</h1>
    <div class="stats">
      <span>&#9876; <span id="player-ships">5</span></span>
      <span>&#128165; <span id="cpu-ships">5</span></span>
      <span>&#9201; <span id="timer-display">00:00</span></span>
    </div>
  </header>

  <div class="game-wrapper">
    <div class="turn-indicator" id="turn-indicator">Posicione seus navios</div>

    <!-- Phase 1: Ship Placement -->
    <div id="placement-panel" class="placement-panel">
      <div class="placement-info">
        <p id="placement-ship-name">Porta-avioes (5 casas)</p>
        <div class="placement-buttons">
          <button class="btn btn-small" id="btn-rotate">Girar (H)</button>
          <button class="btn btn-small btn-blue" id="btn-random">Aleatorio</button>
        </div>
      </div>
      <div class="board-container single-board">
        <div class="grid-label">Seu Mar</div>
        <div class="grid-headers">
          <div class="corner"></div>
          <div class="col-headers" id="placement-col-headers"></div>
        </div>
        <div class="grid-body">
          <div class="row-headers" id="placement-row-headers"></div>
          <div class="grid" id="placement-grid"></div>
        </div>
      </div>
      <button class="btn btn-orange btn-start hidden" id="btn-start">Iniciar Batalha</button>
    </div>

    <!-- Phase 2: Battle -->
    <div id="battle-panel" class="battle-panel hidden">
      <div class="boards">
        <div class="board-container">
          <div class="grid-label">Seu Mar</div>
          <div class="grid-headers">
            <div class="corner"></div>
            <div class="col-headers" id="player-col-headers"></div>
          </div>
          <div class="grid-body">
            <div class="row-headers" id="player-row-headers"></div>
            <div class="grid" id="player-grid"></div>
          </div>
        </div>
        <div class="board-container">
          <div class="grid-label">Mar Inimigo</div>
          <div class="grid-headers">
            <div class="corner"></div>
            <div class="col-headers" id="enemy-col-headers"></div>
          </div>
          <div class="grid-body">
            <div class="row-headers" id="enemy-row-headers"></div>
            <div class="grid" id="enemy-grid"></div>
          </div>
        </div>
      </div>
      <div class="ship-status" id="ship-status"></div>
    </div>
  </div>

  <!-- Modal de fim de jogo -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-icon" id="modal-icon">&#127942;</div>
      <h2 id="modal-title">Fim de jogo</h2>
      <p id="modal-msg">Resultado</p>
      <button class="btn btn-orange" id="btn-play-again">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=4';
    initSidebar({ active: 'batalha' });
  </script>
  <script type="module" src="game.js?v=1"></script>
</body>
</html>
