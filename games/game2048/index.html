<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>2048 Online Gratis - Game Hub</title>
  <meta name="description" content="Jogue 2048 online e de graca. Deslize os blocos e alcance o numero 2048!" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/game2048/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">🔢 2048</h1>
    <div class="stats">
      <span>⭐ <span id="score-display">0</span></span>
    </div>
  </header>

  <main class="game-container">
    <div class="score-bar">
      <div class="score-box">
        <div class="score-label">Pontos</div>
        <div class="score-value" id="score-main">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Recorde</div>
        <div class="score-value" id="best-score">0</div>
      </div>
    </div>

    <div class="board" id="board">
      <!-- 4x4 grid generated by JS -->
    </div>

    <button class="btn btn-orange" id="btn-new-game">Novo Jogo</button>
    <p class="hint-text">Use setas, WASD ou deslize para jogar</p>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Fim de Jogo</h2>
      <p id="modal-message">Pontuacao: 0</p>
      <button class="btn btn-orange" id="btn-play-again">Jogar Novamente</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=3';
    initSidebar({ active: '2048' });
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
