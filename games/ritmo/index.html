<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">← Voltar</a>
    <h1 class="game-title">🎵 Ritmo Brasileiro</h1>
    <div class="stats">
      <div class="score-box">
        <span class="score-icon">🎯</span>
        <span id="score-display" class="score-value neon-text">0</span>
      </div>
      <div class="score-box best">
        <span class="score-icon">🏆</span>
        <span id="best-display" class="score-value">0</span>
      </div>
    </div>
  </header>

  <div class="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD superior -->
    <div class="hud-top">
      <div class="combo-display" id="combo-display" style="display:none;">
        <span class="combo-count" id="combo-count">0</span>
        <span class="combo-label">COMBO</span>
        <span class="combo-mult" id="combo-mult">x1</span>
      </div>
      <div class="progress-bar-container" id="progress-container" style="display:none;">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <!-- Feedback de timing -->
    <div class="timing-feedback" id="timing-feedback"></div>

    <!-- Overlay de inicio -->
    <div class="modal-overlay glass-overlay" id="overlay">
      <div class="modal glass-modal">
        <div class="modal-icon" id="overlay-icon">🎵</div>
        <h2 id="overlay-title" class="modal-title">Ritmo Brasileiro</h2>
        <p id="overlay-msg" class="modal-subtitle">Sinta o ritmo! Escolha um genero e toque no ritmo da musica.</p>
        <div id="overlay-score" class="overlay-score neon-score"></div>
        <button type="button" class="btn btn-primary" id="btn-start">Escolher Musica</button>
        <button type="button" class="btn btn-whatsapp" id="btn-share" style="display:none; margin-top: 12px;">📱 Compartilhar</button>
      </div>
    </div>

    <!-- Modal de selecao de genero -->
    <div class="modal-overlay glass-overlay" id="genre-modal" style="display:none;">
      <div class="modal glass-modal genre-select-modal">
        <h2 class="modal-title">Escolha o Ritmo</h2>

        <!-- Seletor de dificuldade -->
        <div class="difficulty-selector">
          <button class="diff-btn" data-diff="easy">Facil</button>
          <button class="diff-btn active" data-diff="normal">Normal</button>
          <button class="diff-btn" data-diff="hard">Dificil</button>
        </div>

        <div class="genre-grid">
          <button class="genre-card" data-genre="samba">
            <span class="genre-emoji">🥁</span>
            <span class="genre-name">Samba</span>
            <span class="genre-bpm">100 BPM</span>
            <span class="genre-desc">Percussao forte</span>
          </button>
          <button class="genre-card" data-genre="bossa">
            <span class="genre-emoji">🎸</span>
            <span class="genre-name">Bossa Nova</span>
            <span class="genre-bpm">80 BPM</span>
            <span class="genre-desc">Suave e melodico</span>
          </button>
          <button class="genre-card" data-genre="funk">
            <span class="genre-emoji">🔊</span>
            <span class="genre-name">Funk Carioca</span>
            <span class="genre-bpm">130 BPM</span>
            <span class="genre-desc">Beat pesado</span>
          </button>
          <button class="genre-card" data-genre="forro">
            <span class="genre-emoji">🪗</span>
            <span class="genre-name">Forro</span>
            <span class="genre-bpm">120 BPM</span>
            <span class="genre-desc">Triangulo + Zabumba</span>
          </button>
          <button class="genre-card" data-genre="baiao">
            <span class="genre-emoji">🪘</span>
            <span class="genre-name">Baiao</span>
            <span class="genre-bpm">110 BPM</span>
            <span class="genre-desc">Triangulo + Sanfona</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Controles mobile -->
  <div class="mobile-controls" id="mobile-controls">
    <button class="lane-btn lane-0" data-lane="0" aria-label="Pista 1">D</button>
    <button class="lane-btn lane-1" data-lane="1" aria-label="Pista 2">F</button>
    <button class="lane-btn lane-2" data-lane="2" aria-label="Pista 3">J</button>
    <button class="lane-btn lane-3" data-lane="3" aria-label="Pista 4">K</button>
  </div>
