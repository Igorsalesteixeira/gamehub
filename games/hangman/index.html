<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <meta name="description" content="Jogue Forca online e de graca. Adivinhe a palavra antes que o boneco seja enforcado! Centenas de palavras em portugues." />
  <meta name="keywords" content="forca online, jogo da forca, hangman portugues, forca gratis, jogo de palavras" />
  <link rel="canonical" href="https://igorsalesteixeira.github.io/gamehub/games/hangman/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Forca Online Gratis - Game Hub" />
  <meta property="og:description" content="Jogue Forca online e de graca. Adivinhe a palavra antes que o boneco seja enforcado!" />

  <meta property="og:image" content="https://igorsalesteixeira.github.io/gamehub/og-image.png" />
  <meta property="og:locale" content="pt_BR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forca Online Gratis - Game Hub" />
  <meta name="twitter:description" content="Jogue Forca online e de graca!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609"
     crossorigin="anonymous"></script>
</head>
<body>

  <header class="topbar">
    <a href="../../index.html" class="btn-back">&larr; Voltar</a>
    <h1 class="game-title">&#128292; Forca</h1>
    <div class="stats">
      <span>&#127942; <span id="wins-display">0</span></span>
    </div>
  </header>

  <main class="game-container">

    <div class="game-area">
      <!-- SVG Hangman -->
      <div class="hangman-svg-wrapper">
        <svg id="hangman-svg" viewBox="0 0 200 220" class="hangman-svg">
          <!-- Gallows (always visible) -->
          <line x1="20" y1="210" x2="180" y2="210" stroke="#5a3e2b" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="210" x2="60" y2="20" stroke="#5a3e2b" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="20" x2="130" y2="20" stroke="#5a3e2b" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="20" x2="130" y2="45" stroke="#5a3e2b" stroke-width="3" stroke-linecap="round"/>
          <line x1="60" y1="50" x2="85" y2="20" stroke="#5a3e2b" stroke-width="3" stroke-linecap="round"/>

          <!-- Body parts (hidden by default) -->
          <!-- Head -->
          <circle id="hm-head" cx="130" cy="60" r="15" stroke="#e8e8e8" stroke-width="3" fill="none" class="hm-part"/>
          <!-- Body -->
          <line id="hm-body" x1="130" y1="75" x2="130" y2="130" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" class="hm-part"/>
          <!-- Left arm -->
          <line id="hm-left-arm" x1="130" y1="90" x2="105" y2="115" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" class="hm-part"/>
          <!-- Right arm -->
          <line id="hm-right-arm" x1="130" y1="90" x2="155" y2="115" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" class="hm-part"/>
          <!-- Left leg -->
          <line id="hm-left-leg" x1="130" y1="130" x2="105" y2="170" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" class="hm-part"/>
          <!-- Right leg -->
          <line id="hm-right-leg" x1="130" y1="130" x2="155" y2="170" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" class="hm-part"/>
        </svg>
      </div>

      <!-- Info area -->
      <div class="info-area">
        <div class="category-hint">
          <span class="hint-label">Categoria:</span>
          <span id="category-name" class="hint-value">---</span>
        </div>
        <div class="wrong-counter">
          <span>Erros: <strong id="wrong-count">0</strong> / 6</span>
        </div>
      </div>

      <!-- Word display -->
      <div class="word-display" id="word-display">
        <!-- Letters/blanks generated by JS -->
      </div>
    </div>

    <!-- Virtual Keyboard -->
    <div class="keyboard" id="keyboard">
      <!-- Generated by JS -->
    </div>

  </main>

  <!-- Result Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title"></h2>
      <p id="modal-message"></p>
      <p class="modal-word">A palavra era: <strong id="modal-word"></strong></p>
      <button class="btn btn-orange" id="btn-new-game">Novo Jogo</button>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../../sidebar.js?v=2';
    initSidebar({ active: 'forca' });
  </script>
  <script type="module" src="game.js?v=1"></script>
</body>
</html>
