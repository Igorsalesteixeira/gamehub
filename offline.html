<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Games Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #4CAF50;
      color: #3E2723;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
    }
    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      padding: 0.9rem 2rem;
      background: linear-gradient(180deg, #FF7043, #FF5722);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      border: 3px solid #E64A19;
      cursor: pointer;
      box-shadow: 0 4px 0 #BF360C, 0 6px 12px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #BF360C, 0 8px 16px rgba(0,0,0,0.2);
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #BF360C;
    }
    .cached-games {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #F5E6D0;
      border-radius: 20px;
      border: 3px solid #8D6E63;
      box-shadow: 0 4px 0 #5D4037;
    }
    .cached-games h2 {
      font-size: 1rem;
      color: #5D4037;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .game-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      margin: 0.25rem;
      background: #FFF8F0;
      border: 2px solid #D7CCC8;
      border-radius: 12px;
      color: #3E2723;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.2s;
    }
    .game-link:hover {
      border-color: #4CAF50;
      background: #E8F5E9;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="offline-icon">📡</div>
  <h1>Você está offline</h1>
  <p>Parece que você perdeu a conexão com a internet. Verifique sua rede e tente novamente.</p>
  <button class="btn" onclick="window.location.reload()">Tentar Novamente</button>

  <div class="cached-games" id="cached-games" style="display:none">
    <h2>🎮 Jogos disponíveis offline:</h2>
    <div id="games-list"></div>
  </div>

  <script>
    // Verifica jogos em cache
    if ('caches' in window) {
      caches.open('gameshub-games-v1').then(cache => {
        cache.keys().then(requests => {
          const games = new Set();
          requests.forEach(req => {
            const match = req.url.match(/\/games\/([^/]+)/);
            if (match) games.add(match[1]);
          });
          if (games.size > 0) {
            document.getElementById('cached-games').style.display = 'block';
            const list = document.getElementById('games-list');
            games.forEach(game => {
              const a = document.createElement('a');
              a.href = `/games/${game}/`;
              a.className = 'game-link';
              a.textContent = `🎮 ${game}`;
              list.appendChild(a);
            });
          }
        });
      });
    }
  </script>
</body>
</html>
