<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Games Hub 🎮</title>
  <meta name="theme-color" content="#0d0d19" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css?v=2" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609"
     crossorigin="anonymous"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LNTD0KNJ6T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LNTD0KNJ6T');
  </script>
</head>
<body>

  <div class="auth-wrapper">
    <a href="index.html" class="back-link">← Voltar ao lobby</a>

    <div class="auth-card">
      <div class="auth-logo">🎮 Games Hub</div>

      <!-- SSO Buttons -->
      <div class="sso-buttons">
        <button class="btn-sso" onclick="loginWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continuar com Google
        </button>
      </div>

      <div class="divider">ou use seu e-mail</div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab" id="tab-signup" onclick="showTab('signup')">Criar conta</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="login-error"></div>
        <button type="submit" class="btn-submit" id="login-btn">Entrar</button>
      </form>

      <!-- Signup Form -->
      <form id="form-signup" class="auth-form hidden" onsubmit="handleSignup(event)">
        <div class="field">
          <label>Nome de usuário</label>
          <input type="text" id="signup-name" placeholder="Como quer ser chamado?" required minlength="2" />
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="signup-email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>
        <div class="error-msg" id="signup-error"></div>
        <button type="submit" class="btn-submit" id="signup-btn">Criar conta</button>
      </form>

      <!-- Success message -->
      <div class="success-msg hidden" id="success-msg"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = 'index.html';

    // ---- SSO ----
    const SITE_URL = 'https://gameshub.com.br';

    window.loginWithGoogle = async function() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: SITE_URL + '/index.html' }
      });
      if (error) alert('Erro ao entrar com Google: ' + error.message);
    };

    // ---- Tabs ----
    window.showTab = function(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('login-error').textContent = '';
      document.getElementById('signup-error').textContent = '';
    };

    // ---- Email login ----
    window.handleLogin = async function(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.textContent = 'Entrando...';
      btn.disabled = true;
      errEl.textContent = '';

      const { error } = await supabase.auth.signInWithPassword({
        email:    document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });

      if (error) {
        errEl.textContent = traduzirErro(error.message);
        btn.textContent = 'Entrar';
        btn.disabled = false;
      } else {
        window.location.href = 'index.html';
      }
    };

    // ---- Email signup ----
    window.handleSignup = async function(e) {
      e.preventDefault();
      const btn   = document.getElementById('signup-btn');
      const errEl = document.getElementById('signup-error');
      const sucEl = document.getElementById('success-msg');
      btn.textContent = 'Criando conta...';
      btn.disabled = true;
      errEl.textContent = '';

      const { error } = await supabase.auth.signUp({
        email:    document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        options:  { data: { display_name: document.getElementById('signup-name').value.trim() } }
      });

      if (error) {
        errEl.textContent = traduzirErro(error.message);
        btn.textContent = 'Criar conta';
        btn.disabled = false;
      } else {
        document.getElementById('form-signup').classList.add('hidden');
        sucEl.textContent = '✅ Conta criada! Verifique seu e-mail para confirmar o cadastro.';
        sucEl.classList.remove('hidden');
      }
    };

    function traduzirErro(msg) {
      if (msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
      if (msg.includes('Email not confirmed'))       return 'Confirme seu e-mail antes de entrar.';
      if (msg.includes('User already registered'))   return 'Este e-mail já está cadastrado.';
      if (msg.includes('Password should be'))        return 'A senha deve ter pelo menos 6 caracteres.';
      return msg;
    }
  </script>
</body>
</html>
