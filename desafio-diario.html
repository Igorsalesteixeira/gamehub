    .challenge-completed {

    }

    .challenge-completed .challenge-play-btn {

<body>
  <header class="topbar">
    <a href="index.html" class="btn-back">&#8592; Voltar</a>
    <h1 class="page-title">&#127942; Desafio Di&#225;rio</h1>
  </header>

  <div class="challenge-container">
    <p class="challenge-date" id="challenge-date"></p>

    <div class="challenge-card" id="challenge-card">
      <div class="challenge-icon" id="challenge-icon"></div>
      <h2 class="challenge-game-name" id="challenge-game-name"></h2>
      <p class="challenge-desc">Mesmo puzzle para todos os jogadores. Uma chance s&#243;!</p>
      <a class="challenge-play-btn" id="challenge-play-btn" href="#">Jogar Desafio</a>
      <div class="challenge-streak" id="challenge-streak"></div>
    </div>

    <div class="schedule">
      <h2>Calend&#225;rio Semanal</h2>
      <div class="schedule-grid" id="schedule-grid"></div>
    </div>
  </div>

  <footer class="footer">Games Hub &copy; 2024-2026</footer>

  <script type="module">
    import { dailyChallenge, DAILY_GAMES } from './games/shared/daily-challenge.js';

    const info = dailyChallenge.getTodayInfo();
    const dayNames = ['Domingo', 'Segunda', 'Ter\u00E7a', 'Quarta', 'Quinta', 'Sexta', 'S\u00E1bado'];

    // Format date
    const dateObj = new Date(info.date + 'T12:00:00');
    const options = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('challenge-date').textContent =
      dateObj.toLocaleDateString('pt-BR', options);

    // Today's challenge
    document.getElementById('challenge-icon').textContent = info.game.icon;
    document.getElementById('challenge-game-name').textContent = info.game.name;

    const playBtn = document.getElementById('challenge-play-btn');
    playBtn.href = info.game.path + '?daily=' + info.seed;

    if (info.completed) {
      document.getElementById('challenge-card').classList.add('challenge-completed');
      playBtn.textContent = '\u2705 Conclu\u00EDdo!';
      playBtn.removeAttribute('href');
      playBtn.style.pointerEvents = 'none';
    }

    // Challenge streak
    const challengeStreak = dailyChallenge.getChallengeStreak();
    if (challengeStreak > 0) {
      document.getElementById('challenge-streak').textContent =
        `\u{1F525} ${challengeStreak} desafio${challengeStreak > 1 ? 's' : ''} consecutivo${challengeStreak > 1 ? 's' : ''}`;
    }

    // Schedule
    const grid = document.getElementById('schedule-grid');
    const today = new Date();
    const brt = new Date(today.getTime() - 3 * 60 * 60 * 1000);
    const currentDay = brt.getDay();

    const orderedDays = [1, 2, 3, 4, 5, 6, 0]; // Mon to Sun
    orderedDays.forEach(dayNum => {
      const game = DAILY_GAMES.find(g => g.day === dayNum);
      if (!game) return;

      const item = document.createElement('div');
      item.className = 'schedule-item' + (dayNum === currentDay ? ' today' : '');
      item.innerHTML = `
        <div class="schedule-day">${dayNames[dayNum]}</div>
        <div class="schedule-icon">${game.icon}</div>
        <div class="schedule-name">${game.name}</div>
      `;
      grid.appendChild(item);
    });
  </script>
