<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Games Hub</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=11" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7180169008033609"
     crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LNTD0KNJ6T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LNTD0KNJ6T');
  </script>
  <style>
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
      width: 100%;
      flex: 1;
    }

    /* ===== HERO SECTION ===== */
    .profile-hero {
      background: linear-gradient(180deg, #66BB6A, #43A047, #388E3C);
      border: 3px solid #2E7D32;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 0 #1B5E20;
    }

    .profile-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-content {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .profile-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(180deg, #FF7043, #FF5722);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      border: 4px solid #FFF8F0;
      box-shadow: 0 4px 0 #BF360C;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .profile-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    .profile-level {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .level-badge {
      background: #FF5722;
      border: 2px solid #E64A19;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 0 #BF360C;
    }

    .xp-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    .xp-bar {
      height: 10px;
      background: rgba(0,0,0,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.4rem;
      max-width: 300px;
      border: 2px solid rgba(0,0,0,0.1);
    }

    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD54F, #FFB300);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .profile-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn-action {
      padding: 0.6rem 1.1rem;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: none;
    }

    .btn-add-friend {
      background: linear-gradient(180deg, #66BB6A, #43A047);
      border: 2px solid #2E7D32;
      color: #fff;
      box-shadow: 0 3px 0 #1B5E20;
    }

    .btn-add-friend:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #1B5E20;
    }

    .btn-remove-friend {
      background: #FFEBEE;
      border: 2px solid #EF5350;
      color: #C62828;
      box-shadow: 0 3px 0 #C62828;
    }

    .btn-remove-friend:hover {
      background: #FFCDD2;
    }

    .btn-challenge {
      background: linear-gradient(180deg, #AB47BC, #8E24AA);
      border: 2px solid #6A1B9A;
      color: #fff;
      box-shadow: 0 3px 0 #4A148C;
    }

    .btn-challenge:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #4A148C;
    }

    .btn-block {
      background: #F5E6D0;
      border: 2px solid #8D6E63;
      color: #5D4037;
      box-shadow: 0 3px 0 #5D4037;
    }

    .btn-block:hover {
      background: #EFDFCC;
    }

    .btn-back {
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      text-decoration: none;
      box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.35);
    }

    /* ===== STATS GRID ===== */
    .stats-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: #795548;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: #D7CCC8;
      margin-left: 0.5rem;
      border-radius: 1px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .stat-card {
      background: #F5E6D0;
      border: 3px solid #8D6E63;
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #5D4037;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #5D4037;
    }

    .stat-icon {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #3E2723;
      margin-bottom: 0.2rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #795548;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== COMMON GAMES ===== */
    .common-games-section {
      margin-bottom: 2rem;
    }

    .games-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .game-item {
      background: #F5E6D0;
      border: 3px solid #8D6E63;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #5D4037;
    }

    .game-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #5D4037;
    }

    .game-icon-small {
      width: 48px;
      height: 48px;
      background: linear-gradient(180deg, #42A5F5, #1E88E5);
      border: 3px solid #1565C0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 3px 0 #0D47A1;
    }

    .game-info {
      flex: 1;
      min-width: 0;
    }

    .game-name {
      font-size: 1rem;
      font-weight: 700;
      color: #3E2723;
      margin-bottom: 0.15rem;
    }

    .game-stats {
      font-size: 0.8rem;
      color: #795548;
      font-weight: 600;
    }

    .btn-play {
      background: linear-gradient(180deg, #FF7043, #FF5722);
      border: 2px solid #E64A19;
      border-radius: 10px;
      padding: 0.5rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      box-shadow: 0 3px 0 #BF360C;
    }

    .btn-play:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #BF360C;
    }

    /* ===== ACTIVITY FEED ===== */
    .activity-section {
      margin-bottom: 2rem;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .activity-item {
      background: #F5E6D0;
      border: 3px solid #8D6E63;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: 0 4px 0 #5D4037;
    }

    .activity-icon {
      width: 40px;
      height: 40px;
      background: #EFDFCC;
      border: 2px solid #A1887F;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .activity-content {
      flex: 1;
      min-width: 0;
    }

    .activity-text {
      font-size: 0.95rem;
      color: #5D4037;
      line-height: 1.5;
      margin-bottom: 0.3rem;
    }

    .activity-text strong {
      color: #3E2723;
      font-weight: 700;
    }

    .activity-time {
      font-size: 0.75rem;
      color: #795548;
      font-weight: 600;
    }

    .activity-score {
      background: linear-gradient(180deg, #66BB6A, #43A047);
      border: 2px solid #2E7D32;
      color: #fff;
      padding: 0.3rem 0.7rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 2px 0 #1B5E20;
    }

    .activity-score.lose {
      background: linear-gradient(180deg, #EF5350, #E53935);
      border-color: #C62828;
      box-shadow: 0 2px 0 #B71C1C;
    }

    /* ===== FRIENDS LINK ===== */
    .view-friends-link {
      display: block;
      background: #F5E6D0;
      border: 3px dashed #8D6E63;
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      text-decoration: none;
      color: #5D4037;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .view-friends-link:hover {
      background: #EFDFCC;
      border-color: #FF5722;
      color: #FF5722;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1.5rem;
      color: #795548;
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      opacity: 0.6;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #5D4037;
    }

    .empty-state p {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ===== LOADING STATE ===== */
    .loading-state {
      text-align: center;
      padding: 3rem;
      color: rgba(255,255,255,0.8);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #FFD54F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== NOT FOUND ===== */
    .not-found {
      text-align: center;
      padding: 4rem 1.5rem;
    }

    .not-found-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    .not-found h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    .not-found p {
      color: rgba(255,255,255,0.8);
      margin-bottom: 1.5rem;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .profile-hero {
        padding: 1.5rem;
      }

      .profile-avatar-large {
        width: 64px;
        height: 64px;
        font-size: 1.8rem;
      }

      .profile-name {
        font-size: 1.4rem;
      }

      .hero-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .profile-info {
        width: 100%;
      }

      .profile-actions {
        justify-content: center;
      }

      .xp-bar {
        margin: 0.4rem auto 0;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        gap: 0.7rem;
      }

      .stat-card {
        padding: 1rem 0.8rem;
      }

      .stat-icon {
        font-size: 1.4rem;
      }

      .stat-value {
        font-size: 1.1rem;
      }

      .stat-label {
        font-size: 0.65rem;
      }

      .profile-actions {
        flex-direction: column;
        width: 100%;
      }

      .btn-action {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Skip Link -->
  <a href="#main-content" class="skip-link">Pular para conteúdo principal</a>

  <div class="profile-container">
    <!-- Profile Hero -->
    <div id="profile-hero" class="profile-hero">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Carregando perfil...</p>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="stats-section" id="stats-section" style="display: none;">
      <div class="section-title">Estatísticas</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">&#127918;</div>
          <div class="stat-value" id="stat-favorite">-</div>
          <div class="stat-label">Jogo Favorito</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#128200;</div>
          <div class="stat-value" id="stat-games">-</div>
          <div class="stat-label">Partidas</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#127942;</div>
          <div class="stat-value" id="stat-winrate">-</div>
          <div class="stat-label">Taxa de Vitória</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#9201;</div>
          <div class="stat-value" id="stat-time">-</div>
          <div class="stat-label">Tempo Jogado</div>
        </div>
      </div>
    </div>

    <!-- Common Games Section -->
    <div class="common-games-section" id="common-games-section" style="display: none;">
      <div class="section-title">Jogos em Comum</div>
      <div id="common-games-list" class="games-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Activity Section -->
    <div class="activity-section" id="activity-section" style="display: none;">
      <div class="section-title">Atividades Recentes</div>
      <div id="activity-list" class="activity-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- View Friends Link -->
    <a href="social.html" class="view-friends-link" id="view-friends" style="display: none;">
      &#128101; Ver todos os amigos
    </a>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { initSidebar } from './sidebar.js?v=7';
    import {
      getUserProfile,
      checkFriendshipStatus,
      sendFriendRequest,
      removeFriend,
      blockUser,
      getCommonGames,
      getUserStats,
      getUserActivity
    } from './social.js';
    import { subscribeToNotifications } from './notifications.js';
    import { sendChallenge } from './challenge-system.js';

    // Inicializa sidebar
    initSidebar({ active: 'profile' });

    // Inscreve em notificações
    subscribeToNotifications();

    // Pega ID da URL
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    // Estado
    let profileData = null;
    let isFriend = false;
    let isSelf = false;
    let friendshipId = null;

    // Elementos
    const profileHero = document.getElementById('profile-hero');
    const statsSection = document.getElementById('stats-section');
    const commonGamesSection = document.getElementById('common-games-section');
    const activitySection = document.getElementById('activity-section');
    const viewFriendsLink = document.getElementById('view-friends');

    // Carrega perfil
    async function loadProfile() {
      if (!userId) {
        showNotFound('Usuário não especificado');
        return;
      }

      const { data: profile, error } = await getUserProfile(userId);

      if (error || !profile) {
        showNotFound('Usuário não encontrado');
        return;
      }

      profileData = profile;

      // Verifica se é o próprio usuário
      const { data: { session } } = await import('./supabase.js').then(m => m.supabase.auth.getSession());
      if (session?.user?.id === userId) {
        isSelf = true;
        window.location.href = 'profile.html';
        return;
      }

      // Verifica status de amizade
      const { data: friendshipData } = await checkFriendshipStatus(userId);
      isFriend = friendshipData?.is_friend || false;
      friendshipId = friendshipData?.id;

      renderProfile(profile);
      loadStats(userId);
      loadCommonGames(userId);
      loadActivity(userId);

      // Mostra seções
      statsSection.style.display = 'block';
      commonGamesSection.style.display = 'block';
      activitySection.style.display = 'block';
      viewFriendsLink.style.display = 'block';
    }

    function showNotFound(message) {
      profileHero.innerHTML = `
        <div class="not-found">
          <div class="not-found-icon">&#128100;</div>
          <h2>${message}</h2>
          <p>O usuário pode não existir ou ter sido removido.</p>
          <a href="social.html" class="btn-action btn-back" style="display: inline-flex;">
            &#8592; Voltar para Amigos
          </a>
        </div>
      `;
    }

    function renderProfile(profile) {
      const avatarLetter = (profile.display_name || profile.username || '?')[0].toUpperCase();
      const level = profile.level || 1;
      const xp = profile.xp || 0;
      const xpForNext = profile.xp_for_next_level || 100;
      const xpProgress = Math.min((xp / xpForNext) * 100, 100);

      profileHero.innerHTML = `
        <div class="hero-content">
          <div class="profile-avatar-large">${avatarLetter}</div>
          <div class="profile-info">
            <div class="profile-name">${profile.display_name || profile.username}</div>
            <div class="profile-level">
              <span class="level-badge">Nível ${level}</span>
              <span class="xp-text">${xp}/${xpForNext} XP</span>
            </div>
            <div class="xp-bar">
              <div class="xp-bar-fill" style="width: ${xpProgress}%"></div>
            </div>
            <div class="profile-actions">
              ${isFriend ? `
                <button class="btn-action btn-challenge" onclick="challengeUser('${profile.id}', '${profile.username}')">
                  &#9876; Desafiar
                </button>
                <button class="btn-action btn-remove-friend" onclick="removeFriendConfirm()">
                  &#128465; Remover Amigo
                </button>
              ` : `
                <button class="btn-action btn-add-friend" onclick="addFriend()">
                  &#128101; Adicionar Amigo
                </button>
              `}
              <button class="btn-action btn-block" onclick="blockUserConfirm()">
                &#128683; Bloquear
              </button>
              <a href="social.html" class="btn-action btn-back">
                &#8592; Voltar
              </a>
            </div>
          </div>
        </div>
      `;
    }

    async function loadStats(userId) {
      const { data: stats } = await getUserStats(userId);

      if (stats) {
        document.getElementById('stat-favorite').textContent = stats.favorite_game || '-';
        document.getElementById('stat-games').textContent = stats.total_games?.toLocaleString() || '0';
        document.getElementById('stat-winrate').textContent = stats.win_rate ? `${stats.win_rate}%` : '-';
        document.getElementById('stat-time').textContent = stats.total_time || '0h';
      }
    }

    async function loadCommonGames(userId) {
      const { data: games } = await getCommonGames(userId);
      const list = document.getElementById('common-games-list');

      if (!games || games.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#127918;</div>
            <h3>Sem jogos em comum</h3>
            <p>Vocês ainda não jogaram os mesmos jogos</p>
          </div>
        `;
        return;
      }

      list.innerHTML = games.map(game => `
        <div class="game-item">
          <div class="game-icon-small">${game.icon || '&#127918;'}</div>
          <div class="game-info">
            <div class="game-name">${game.name}</div>
            <div class="game-stats">${game.your_high_score?.toLocaleString() || 0} pts (você) · ${game.their_high_score?.toLocaleString() || 0} pts (ele)</div>
          </div>
          <a href="games/${game.id}/index.html" class="btn-play">Jogar &#9654;</a>
        </div>
      `).join('');
    }

    async function loadActivity(userId) {
      const { data: activities } = await getUserActivity(userId);
      const list = document.getElementById('activity-list');

      if (!activities || activities.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">&#128197;</div>
            <h3>Sem atividades recentes</h3>
            <p>Este usuário ainda não tem atividades públicas</p>
          </div>
        `;
        return;
      }

      const activityIcons = {
        'game_completed': '&#127942;',
        'high_score': '&#127937;',
        'level_up': '&#11088;',
        'friend_added': '&#128101;',
        'challenge_sent': '&#9876;',
        'achievement': '&#127942;'
      };

      list.innerHTML = activities.slice(0, 5).map(activity => `
        <div class="activity-item">
          <div class="activity-icon">${activityIcons[activity.type] || '&#128161;'}</div>
          <div class="activity-content">
            <div class="activity-text">${activity.description}</div>
            <div class="activity-time">${formatTimeAgo(activity.created_at)}</div>
          </div>
          ${activity.score ? `<div class="activity-score ${activity.won ? '' : 'lose'}">${activity.score > 0 ? '+' : ''}${activity.score}</div>` : ''}
        </div>
      `).join('');
    }

    function formatTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return 'Agora mesmo';
      if (diff < 3600) return `Há ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `Há ${Math.floor(diff / 3600)} h`;
      if (diff < 604800) return `Há ${Math.floor(diff / 86400)} d`;
      return date.toLocaleDateString('pt-BR');
    }

    // Ações globais
    window.challengeUser = async function(userId, username) {
      const gameType = prompt(`Desafiar ${username} em qual jogo?\n\nOpções: tictactoe, chess, checkers, connect4, reversi, battleship, truco, uno`);
      if (!gameType) return;

      const { error } = await sendChallenge(userId, gameType.trim().toLowerCase());
      if (error) {
        alert('Erro: ' + error.message);
      } else {
        alert('Desafio enviado com sucesso!');
      }
    };

    window.addFriend = async function() {
      if (!profileData) return;

      const { error } = await sendFriendRequest(profileData.id);
      if (error) {
        alert('Erro: ' + error.message);
      } else {
        alert('Solicitação de amizade enviada!');
        // Atualiza o botão
        const btn = document.querySelector('.btn-add-friend');
        if (btn) {
          btn.textContent = '&#10003; Solicitado';
          btn.disabled = true;
        }
      }
    };

    window.removeFriendConfirm = async function() {
      if (!friendshipId) return;
      if (!confirm('Tem certeza que deseja remover este amigo?')) return;

      const { error } = await removeFriend(friendshipId);
      if (error) {
        alert('Erro: ' + error.message);
      } else {
        isFriend = false;
        friendshipId = null;
        loadProfile(); // Recarrega o perfil
      }
    };

    window.blockUserConfirm = async function() {
      if (!profileData) return;
      if (!confirm('Tem certeza que deseja bloquear este usuário?\n\nVocê não verá mais as atividades dele nem receberá solicitações.')) return;

      const { error } = await blockUser(profileData.id);
      if (error) {
        alert('Erro: ' + error.message);
      } else {
        alert('Usuário bloqueado com sucesso.');
        window.location.href = 'social.html';
      }
    };

    // Carrega o perfil
    loadProfile();
  </script>
</body>
</html>
